<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CB-App Premium</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff7675; --secondary: #a29bfe; --bg: #0f0c29; 
            --card: rgba(255, 255, 255, 0.98); --text: #2d3436; 
            --muted: #636e72; --accent-green: #00b894; --accent-red: #fab1a0; --light-bg: #f8fafc;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top right, #2d3436, #0f0c29); 
            margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; color: var(--text); overflow: hidden;
        }
        
        .container { 
            width: 100%; max-width: 450px; height: 100vh; background: var(--card); 
            display: flex; flex-direction: column; padding: env(safe-area-inset-top) 25px env(safe-area-inset-bottom) 25px; 
            position: relative; animation: slideUp 0.8s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Navigation & Header */
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .brand-logo { font-size: 2.2rem; font-weight: 600; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: -1.5px; }
        
        .logout-icon { background: #f1f2f6; border: none; border-radius: 14px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .logout-icon:active { transform: scale(0.9); background: #eee; }

        /* Lobby / Dashboard */
        .welcome-section { text-align: left; margin: 20px 0; }
        .lobby-status-box { background: var(--light-bg); border-radius: 24px; padding: 25px; margin: 20px 0; border: 1px solid #edf2f7; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 1rem; }
        
        .status-indicator { display: inline-flex; align-items: center; gap: 10px; padding: 8px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; transition: 0.3s; }
        .status-done { background: #e3faf3; color: var(--accent-green); }
        .status-open { background: #fff1f1; color: var(--accent-red); }

        .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.4; } 100% { transform: scale(1); opacity: 1; } }

        /* Quiz Styles */
        .progress-bar { display: flex; justify-content: center; gap: 8px; margin: 10px 0 30px 0; }
        .step-dot { width: 30px; height: 6px; border-radius: 10px; background: #dfe4ea; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .step-dot.active { background: var(--secondary); width: 60px; }
        .step-dot.done { background: var(--accent-green); }

        .info-tab { background: #f1f2ff; border-radius: 18px; padding: 15px; margin-bottom: 20px; font-size: 0.85rem; border-left: 5px solid var(--secondary); animation: fadeIn 0.5s ease; }
        h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 25px; line-height: 1.3; }

        #input-area { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }

        .option-card { background: var(--light-bg); border: 2px solid #edf2f7; padding: 18px; margin-bottom: 12px; border-radius: 20px; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .rank-circle { background: var(--secondary); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; }

        .tot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tot-btn { background: var(--light-bg); border: 2px solid #edf2f7; border-radius: 24px; padding: 40px 10px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .tot-btn.active { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); box-shadow: 0 10px 20px rgba(255, 118, 117, 0.3); }

        textarea { width: 100%; height: 160px; border-radius: 24px; border: 2px solid #edf2f7; padding: 20px; font-family: inherit; font-size: 1.1rem; outline: none; resize: none; background: var(--light-bg); transition: 0.3s; }
        textarea:focus { border-color: var(--secondary); background: white; }

        /* Footer & Main Button */
        .footer-zone { padding: 20px 0 40px 0; }
        .btn-main { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; border: none; padding: 22px; width: 100%; border-radius: 24px; 
            font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(255, 118, 117, 0.3);
        }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }

        /* Ergebnisse / Vergleich */
        .compare-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .bubble { padding: 15px; border-radius: 22px; font-size: 0.85rem; line-height: 1.4; position: relative; }
        .bubble label { display: block; font-size: 0.65rem; font-weight: 600; opacity: 0.6; margin-bottom: 5px; text-transform: uppercase; }
        .bubble-me { background: #f1f0ff; border: 1px solid var(--secondary); }
        .bubble-partner { background: #fff1f1; border: 1px solid #fab1a0; }
        .bubble-partner.done { background: #e3faf3; border-color: var(--accent-green); }

        .hidden { display: none !important; }
        .login-input { width: 100%; padding: 20px; margin-bottom: 12px; border-radius: 20px; border: 2px solid #eee; font-size: 1rem; outline: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-bar">
            <h1 id="nav-title" class="brand-logo">CB</h1>
            <button id="logout-btn" class="logout-icon hidden" onclick="app.logout()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#636e72" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14l5-5-5-5m5 5H9"/></svg>
            </button>
        </div>

        <div id="view-content" style="flex-grow: 1; display: flex; flex-direction: column;">
            
            <div id="login-screen" class="hidden" style="margin-top: 40px;">
                <h2 style="text-align: left; font-size: 2rem;">Willkommen zurück.</h2>
                <p style="color: var(--muted); margin-bottom: 40px;">Melde dich an, um euren heutigen Moment zu starten.</p>
                <input type="email" id="email" class="login-input" placeholder="E-Mail Adresse">
                <input type="password" id="password" class="login-input" placeholder="Passwort">
                <button onclick="app.login()" class="btn-main" style="margin-top: 20px;">Einloggen</button>
            </div>

            <div id="lobby-screen" class="hidden">
                <div class="welcome-section">
                    <h2 id="greet-name" style="margin: 0; font-size: 1.8rem;">Hallo! ❤️</h2>
                    <p id="display-date" style="color: var(--muted); margin-top: 5px;"></p>
                </div>
                
                <div class="lobby-status-box">
                    <div class="status-row">
                        <span>Meine Antwort</span>
                        <div id="my-status-pill" class="status-indicator"></div>
                    </div>
                    <div class="status-row">
                        <span id="p-label-name">Partner</span>
                        <div id="p-status-pill" class="status-indicator"></div>
                    </div>
                </div>

                <div class="footer-zone">
                    <button id="start-btn" class="btn-main" onclick="app.startFlow()">Jetzt loslegen 🚀</button>
                </div>
            </div>

            <div id="quiz-view" class="hidden" style="flex-grow: 1; display: flex; flex-direction: column;">
                <div class="progress-bar">
                    <div id="dot-0" class="step-dot"></div>
                    <div id="dot-1" class="step-dot"></div>
                    <div id="dot-2" class="step-dot"></div>
                </div>

                <div class="info-tab">
                    <b id="cat-label" style="text-transform: uppercase; font-size: 0.7rem; color: var(--secondary); display: block; margin-bottom: 4px;">Kategorie</b>
                    <span id="cat-desc">...</span>
                </div>

                <h2 id="q-text">...</h2>

                <div id="input-area">
                    <div id="rank-list"></div>
                    <div id="tot-area" class="tot-grid hidden"></div>
                    <textarea id="text-input" class="hidden" placeholder="Was geht dir durch den Kopf?"></textarea>
                </div>

                <div class="footer-zone">
                    <button id="next-btn" class="btn-main" onclick="app.handleNext()">Weiter ✨</button>
                </div>
            </div>

            <div id="result-view" class="hidden" style="overflow-y: auto;">
                <h2 style="font-size: 1.8rem; margin-bottom: 20px;">Euer Vergleich</h2>
                <div id="result-container"></div>
                <button style="background:none; border:none; color:var(--muted); padding:30px; width:100%; font-size:0.8rem;" onclick="app.resetData()">Antworten korrigieren 📝</button>
            </div>

        </div>
    </div>

    <script>
        const SB_URL = "https://eedbdbqvwpquoxzbunwo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZGJkYnF2d3BxdW94emJ1bndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzY0NDEsImV4cCI6MjA5MjI1MjQ0MX0.7RKZjDKvieO-hoCpORQeA9uFcGhLqHNTGwvYiK5ogrs";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        const pool = {
            tot: [{q: "Morgenstund?", o: ["Ausschlafen 😴", "Vollgas 🏃"], i: "Entscheide dich für eine der beiden Optionen."}, {q: "Pizza?", o: ["Ananas 🍍", "Niemals! 🚫"], i: "Wähle weise..."}, {q: "Abend-Vibe?", o: ["Couch 🛋️", "Ausgehen 💃"], i: "Was passt heute besser?"}],
            ranking: [{q: "Wichtigste Säule?", o: ["Vertrauen", "Humor", "Ehrlichkeit", "Leidenschaft"], i: "Sortiere nach Wichtigkeit (Platz 1 oben)."}, {q: "Beste Date-Idee?", o: ["Picknick", "Kino", "Kochen", "Wandern"], i: "Was fändest du heute am schönsten?"}],
            text: [{q: "Drei Worte für unseren Tag.", o: [], i: "Schreib etwas Kurzes und Liebes."}, {q: "Was sollten wir bald mal machen?", o: [], i: "Ein kleiner Wunsch für die Zukunft."}]
        };

        const app = {
            session: null, today: new Date().toISOString().split('T')[0],
            myName: "", pName: "", step: 0, dailyQs: [], answers: [], meDone: false,

            async init() {
                const { data: { session } } = await sbClient.auth.getSession();
                if (session) { 
                    this.session = session; 
                    this.identify(); 
                    document.getElementById('logout-btn').classList.remove('hidden');
                    this.syncLobby(); 
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            },

            identify() {
                const email = this.session.user.email.toLowerCase();
                this.myName = email === 'bisf@gmx.de' ? "Bene" : "Clara";
                this.pName = this.myName === "Bene" ? "Clara" : "Bene";
                document.getElementById('nav-title').innerText = `Hi, ${this.myName}`;
                document.getElementById('greet-name').innerText = `Schön, dass du da bist, ${this.myName}! ❤️`;
                document.getElementById('p-label-name').innerText = this.pName;
            },

            async syncLobby() {
                document.getElementById('display-date').innerText = new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
                const { data } = await sbClient.from('answers').select('*').eq('day_key', this.today);
                const me = data?.find(a => a.user_name === this.myName.toLowerCase());
                const other = data?.find(a => a.user_name === this.pName.toLowerCase());
                
                this.meDone = !!me;
                const otherDone = !!other;

                const myPill = document.getElementById('my-status-pill');
                myPill.innerHTML = this.meDone ? 'Fertig ✅' : '<span class="pulse-dot"></span> Offen';
                myPill.className = "status-indicator " + (this.meDone ? "status-done" : "status-open");

                const pPill = document.getElementById('p-status-pill');
                pPill.innerHTML = otherDone ? 'Erledigt ✅' : '<span class="pulse-dot"></span> Denkt nach...';
                pPill.className = "status-indicator " + (otherDone ? "status-done" : "status-open");

                document.getElementById('start-btn').innerText = this.meDone ? "Ergebnisse ansehen ✨" : "Heute starten 🚀";
                document.getElementById('lobby-screen').classList.remove('hidden');
            },

            startFlow() {
                if(this.meDone) this.showFinal();
                else {
                    const seed = parseInt(this.today.replace(/-/g, ''));
                    this.dailyQs = [pool.tot[seed % pool.tot.length], pool.ranking[seed % pool.ranking.length], pool.text[seed % pool.text.length]];
                    document.getElementById('lobby-screen').classList.add('hidden');
                    document.getElementById('quiz-view').classList.remove('hidden');
                    this.render();
                }
            },

            render() {
                const q = this.dailyQs[this.step];
                document.getElementById('q-text').innerText = q.q;
                document.getElementById('cat-label').innerText = q.o.length === 2 ? "This or That" : (q.o.length === 0 ? "Gedanken" : "Ranking");
                document.getElementById('cat-desc').innerText = q.i;
                document.getElementById('next-btn').innerText = this.step < 2 ? "Weiter ✨" : `An ${this.pName} senden ✈️`;
                
                for(let i=0; i<3; i++) document.getElementById(`dot-${i}`).className = 'step-dot' + (i === this.step ? ' active' : (i < this.step ? ' done' : ''));

                const list = document.getElementById('rank-list'), tot = document.getElementById('tot-area'), txt = document.getElementById('text-input');
                list.innerHTML = ""; tot.innerHTML = ""; list.classList.add('hidden'); tot.classList.add('hidden'); txt.classList.add('hidden');

                if (q.o.length === 2) {
                    tot.classList.remove('hidden');
                    q.o.forEach(o => {
                        const d = document.createElement('div'); d.className = 'tot-btn'; d.innerText = o;
                        d.onclick = () => { document.querySelectorAll('.tot-btn').forEach(b => b.classList.remove('active')); d.classList.add('active'); };
                        tot.appendChild(d);
                    });
                } else if (q.o.length > 2) {
                    list.classList.remove('hidden');
                    q.o.forEach((o, i) => {
                        const d = document.createElement('div'); d.className = 'option-card';
                        d.innerHTML = `<span class="rank-circle">${i+1}</span><span>${o}</span>`; list.appendChild(d);
                    });
                    Sortable.create(list, { animation: 250, forceFallback: true, onEnd: () => { document.querySelectorAll('.rank-circle').forEach((n, i) => n.innerText = i + 1); }});
                } else {
                    txt.classList.remove('hidden'); txt.value = "";
                }
            },

            async handleNext() {
                const q = this.dailyQs[this.step];
                let a = "";
                if (q.o.length === 2) a = document.querySelector('.tot-btn.active')?.innerText;
                else if (q.o.length > 2) a = Array.from(document.querySelectorAll('.option-card span:last-child')).map(s => s.innerText).join(" > ");
                else a = document.getElementById('text-input').value.trim();

                if (!a) return alert("Halt! Du hast noch nichts gewählt. ✨");
                this.answers.push(a);

                if (this.step < 2) { this.step++; this.render(); }
                else { 
                    const btn = document.getElementById('next-btn');
                    btn.disabled = true; btn.innerText = "Moment...";
                    const { error } = await sbClient.from('answers').insert([{ user_name: this.myName.toLowerCase(), choice: this.answers.join(" | "), day_key: this.today }]);
                    if (!error) { confetti(); this.meDone = true; this.showFinal(); }
                    else { alert("Fehler beim Senden!"); btn.disabled = false; }
                }
            },

            async showFinal() {
                const { data } = await sbClient.from('answers').select('*').eq('day_key', this.today);
                const me = data?.find(a => a.user_name === this.myName.toLowerCase());
                const other = data?.find(a => a.user_name === this.pName.toLowerCase());
                
                document.getElementById('quiz-view').classList.add('hidden');
                document.getElementById('lobby-screen').classList.add('hidden');
                document.getElementById('result-view').classList.remove('hidden');

                const seed = parseInt(this.today.replace(/-/g, ''));
                const qs = [pool.tot[seed % pool.tot.length], pool.ranking[seed % pool.ranking.length], pool.text[seed % pool.text.length]];
                const myS = me.choice.split(" | "), otherS = other ? other.choice.split(" | ") : null;
                
                let h = "";
                qs.forEach((q, i) => {
                    h += `<div style="margin-top:25px;"><div style="font-size:0.75rem; color:var(--muted); text-transform:uppercase; margin-bottom:8px; border-bottom:1px solid #eee; padding-bottom:5px;">${q.q}</div>
                        <div class="compare-row">
                            <div class="bubble bubble-me"><label>Ich</label>${myS[i]}</div>
                            <div class="bubble bubble-partner ${otherS ? 'done' : ''}"><label>${this.pName}</label>${otherS ? otherS[i] : '⌛ Wartet...'}</div>
                        </div></div>`;
                });
                document.getElementById('result-container').innerHTML = h;
            },

            async resetData() {
                if(!confirm("Antworten löschen und neu starten?")) return;
                await sbClient.from('answers').delete().eq('day_key', this.today).eq('user_name', this.myName.toLowerCase());
                location.reload();
            },

            async login() {
                const e = document.getElementById('email').value.trim(), p = document.getElementById('password').value;
                const { error } = await sbClient.auth.signInWithPassword({ email: e, password: p });
                if (error) alert("Login fehlgeschlagen."); else location.reload();
            },
            logout() { sbClient.auth.signOut().then(() => location.reload()); }
        };
        app.init();
    </script>
</body>
</html>
