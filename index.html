<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CB-App Pro</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff7675; --secondary: #a29bfe; --bg: #0f0c29; 
            --card: #ffffff; --text: #2d3436; 
            --muted: #636e72; --accent-green: #00b894; --light-bg: #f8fafc;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; touch-action: manipulation; }

        body { 
            font-family: 'Outfit', sans-serif; background: #0f0c29; 
            margin: 0; padding: 0; display: flex; justify-content: center; 
            min-height: 100vh; color: var(--text); overflow: hidden;
        }
        
        .container { 
            width: 100%; max-width: 450px; height: 100vh; background: var(--card); 
            display: flex; flex-direction: column; padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; 
            position: relative;
        }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; }
        .brand { font-size: 1.8rem; font-weight: 600; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .logout-btn { background: var(--light-bg); border: none; border-radius: 12px; padding: 8px 12px; font-size: 0.7rem; font-weight: 600; color: var(--muted); cursor: pointer; }

        /* Progress */
        .prog-bar { display: flex; justify-content: center; gap: 8px; margin: 10px 0 20px 0; }
        .dot { width: 35px; height: 6px; border-radius: 10px; background: #eee; transition: 0.4s; }
        .dot.active { background: var(--secondary); transform: scaleX(1.2); }
        .dot.done { background: var(--accent-green); }

        /* Animationen */
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards & Inputs */
        .q-card { background: #fff; border-radius: 24px; padding: 5px; flex-grow: 1; display: flex; flex-direction: column; }
        h2 { font-size: 1.3rem; text-align: center; margin-bottom: 20px; line-height: 1.3; }

        .sortable-item { 
            background: var(--light-bg); border: 2px solid #edf2f7; padding: 16px; 
            margin-bottom: 10px; border-radius: 18px; display: flex; align-items: center; 
            gap: 15px; cursor: grab; transition: transform 0.1s;
        }
        .sortable-ghost { opacity: 0.3; background: var(--secondary); }
        .rank-num { background: var(--secondary); color: white; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; }

        .tot-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tot-card { background: var(--light-bg); border: 2px solid #edf2f7; border-radius: 20px; padding: 35px 10px; text-align: center; font-weight: 600; transition: 0.2s; }
        .tot-card.selected { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.03); }

        textarea { width: 100%; height: 140px; border-radius: 20px; border: 2px solid #eee; padding: 15px; font-family: inherit; font-size: 1rem; outline: none; background: var(--light-bg); }

        /* Footer */
        .footer { padding: 20px 0 30px 0; }
        .btn-next { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; border: none; padding: 20px; width: 100%; border-radius: 20px; 
            font-weight: 600; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(255, 118, 117, 0.2);
        }
        .btn-next:disabled { opacity: 0.6; grayscale: 1; }

        /* Lobby Status */
        .status-box { background: var(--light-bg); border-radius: 20px; padding: 20px; margin: 20px 0; }
        .status-line { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .pill { padding: 6px 14px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .pill.ready { background: #e3faf3; color: var(--accent-green); }
        .pill.wait { background: #fff1f1; color: var(--primary); animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="brand">CB-App</h1>
        <button id="logout-btn" class="logout-btn hidden" onclick="app.logout()">Logout</button>
    </div>

    <div id="main-view" class="fade-in" style="flex-grow: 1; display: flex; flex-direction: column;">
        </div>
</div>

<script>
    const SB_URL = "https://eedbdbqvwpquoxzbunwo.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZGJkYnF2d3BxdW94emJ1bndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzY0NDEsImV4cCI6MjA5MjI1MjQ0MX0.7RKZjDKvieO-hoCpORQeA9uFcGhLqHNTGwvYiK5ogrs";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const pool = {
        tot: [{q: "Morgenstund?", o: ["Ausschlafen 😴", "Vollgas 🏃"]}, {q: "Abend-Vibe?", o: ["Couch 🛋️", "Party 💃"]}],
        ranking: [{q: "Priorität heute?", o: ["Zweisamkeit", "Freizeit", "Erfolg", "Ruhe"]}],
        text: [{q: "Ein Wunsch für uns?", o: []}]
    };

    const app = {
        user: null, myName: "", pName: "", dayKey: new Date().toISOString().split('T')[0],
        step: 0, answers: [], dailyQs: [],

        async init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) return this.showLogin();
            this.user = session.user;
            this.myName = this.user.email.toLowerCase() === 'bisf@gmx.de' ? "Bene" : "Clara";
            this.pName = this.myName === "Bene" ? "Clara" : "Bene";
            document.getElementById('logout-btn').classList.remove('hidden');
            this.showLobby();
        },

        async showLobby() {
            const { data } = await sb.from('answers').select('*').eq('day_key', this.dayKey);
            const me = data?.find(a => a.user_name === this.myName.toLowerCase());
            const other = data?.find(a => a.user_name === this.pName.toLowerCase());

            const view = document.getElementById('main-view');
            view.innerHTML = `
                <h2 style="text-align:left; margin-top:20px;">Hallo ${this.myName}! ❤️</h2>
                <div class="status-box">
                    <div class="status-line"><span>Ich:</span> <span class="pill ${me?'ready':'wait'}">${me?'Fertig ✅':'Offen'}</span></div>
                    <div class="status-line"><span>${this.pName}:</span> <span class="pill ${other?'ready':'wait'}">${other?'Fertig ✅':'Überlegt...'}</span></div>
                </div>
                <div class="footer"><button class="btn-next" onclick="app.startQuiz()">${me?'Vergleich ansehen ✨':'Loslegen 🚀'}</button></div>
            `;
        },

        startQuiz() {
            const seed = parseInt(this.dayKey.replace(/-/g, ''));
            this.dailyQs = [pool.tot[seed % pool.tot.length], pool.ranking[seed % pool.ranking.length], pool.text[seed % pool.text.length]];
            this.renderStep();
        },

        renderStep() {
            const q = this.dailyQs[this.step];
            const view = document.getElementById('main-view');
            view.innerHTML = `
                <div class="prog-bar">${[0,1,2].map(i => `<div class="dot ${i===this.step?'active':(i<this.step?'done':'')}"></div>`).join('')}</div>
                <div class="q-card">
                    <h2>${q.q}</h2>
                    <div id="input-container"></div>
                </div>
                <div class="footer"><button id="next-btn" class="btn-next" onclick="app.collect()">${this.step < 2 ? 'Weiter ✨' : 'Abschicken ✈️'}</button></div>
            `;

            const container = document.getElementById('input-container');
            if (q.o.length === 2) {
                container.className = "tot-box";
                q.o.forEach(o => {
                    const div = document.createElement('div'); div.className = "tot-card"; div.innerText = o;
                    div.onclick = () => { document.querySelectorAll('.tot-card').forEach(c => c.classList.remove('selected')); div.classList.add('selected'); };
                    container.appendChild(div);
                });
            } else if (q.o.length > 2) {
                q.o.forEach((o, i) => {
                    const div = document.createElement('div'); div.className = "sortable-item";
                    div.innerHTML = `<span class="rank-num">${i+1}</span> <span>${o}</span>`;
                    container.appendChild(div);
                });
                new Sortable(container, { animation: 150, ghostClass: 'sortable-ghost', onEnd: () => {
                    document.querySelectorAll('.rank-num').forEach((n, idx) => n.innerText = idx + 1);
                }});
            } else {
                container.innerHTML = `<textarea id="txt-input" placeholder="Deine Antwort..."></textarea>`;
            }
        },

        collect() {
            const q = this.dailyQs[this.step];
            let val = "";
            if (q.o.length === 2) val = document.querySelector('.tot-card.selected')?.innerText;
            else if (q.o.length > 2) val = Array.from(document.querySelectorAll('.sortable-item span:last-child')).map(s => s.innerText).join(" > ");
            else val = document.getElementById('txt-input').value.trim();

            if (!val) return alert("Bitte wähle etwas aus! ✨");
            this.answers.push(val);
            if (this.step < 2) { this.step++; this.renderStep(); }
            else this.submit();
        },

        async submit() {
            const btn = document.getElementById('next-btn');
            btn.disabled = true; btn.innerText = "Wird gespeichert...";
            
            const payload = { user_name: this.myName.toLowerCase(), choice: this.answers.join(" | "), day_key: this.dayKey };
            
            // Retry-Logik (3 Versuche)
            for(let i=0; i<3; i++) {
                const { error } = await sb.from('answers').insert([payload]);
                if (!error) { confetti(); return this.showResults(); }
                console.log(`Versuch ${i+1} fehlgeschlagen...`);
            }
            alert("Fehler beim Senden. Bitte prüfe deine Internetverbindung.");
            btn.disabled = false; btn.innerText = "Erneut versuchen";
        },

        async showResults() {
            const { data } = await sb.from('answers').select('*').eq('day_key', this.dayKey);
            const me = data?.find(a => a.user_name === this.myName.toLowerCase());
            const other = data?.find(a => a.user_name === this.pName.toLowerCase());
            const myA = me.choice.split(" | "), otherA = other ? other.choice.split(" | ") : null;

            const view = document.getElementById('main-view');
            let h = `<h2>Euer Vergleich</h2><div style="overflow-y:auto; flex-grow:1;">`;
            this.dailyQs.forEach((q, i) => {
                h += `<div style="margin-bottom:20px; font-size:0.8rem;">
                    <div style="font-weight:600; color:var(--muted); margin-bottom:8px;">${q.q}</div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div style="background:#f1f0ff; padding:12px; border-radius:15px; border:1px solid var(--secondary);">${myA[i]}</div>
                        <div style="background:${otherA?'#e3faf3':'#fff1f1'}; padding:12px; border-radius:15px; border:1px solid ${otherA? 'var(--accent-green)':'#fab1a0'};">${otherA?otherA[i]:'Wartet...'}</div>
                    </div>
                </div>`;
            });
            h += `</div><div class="footer"><button class="btn-next" onclick="location.reload()">Zurück</button></div>`;
            view.innerHTML = h;
        },

        showLogin() {
            document.getElementById('main-view').innerHTML = `
                <h2 style="margin-top:40px;">Anmelden</h2>
                <input id="em" type="email" style="width:100%; padding:15px; margin-bottom:10px; border-radius:15px; border:1px solid #eee;" placeholder="E-Mail">
                <input id="pw" type="password" style="width:100%; padding:15px; border-radius:15px; border:1px solid #eee;" placeholder="Passwort">
                <div class="footer"><button class="btn-next" onclick="app.login()">Einloggen</button></div>
            `;
        },
        async login() {
            const e = document.getElementById('em').value, p = document.getElementById('pw').value;
            const { error } = await sb.auth.signInWithPassword({ email: e, password: p });
            if (error) alert("Fehler!"); else location.reload();
        },
        logout() { sb.auth.signOut().then(() => location.reload()); }
    };

    app.init();
</script>
</body>
</html>
