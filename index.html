<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CB-App</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #d63031; --secondary: #6c5ce7; --bg: #0f0c29; --card: #ffffff; --text: #1e272e; --muted: #808e9b; --light-bg: #f1f2f6; }
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top right, #302b63, #0f0c29); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 35px; padding: 50px 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.6); text-align: center; margin: auto; box-sizing: border-box; position: relative; }
        .brand-title { font-size: 3.2rem; font-weight: 600; letter-spacing: -2.5px; margin: 0 0 10px 0; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .status-badge { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 30px; font-size: 0.8rem; font-weight: 600; color: var(--muted); background: var(--light-bg); padding: 8px 16px; border-radius: 50px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #dfe4ea; transition: 0.4s; }
        .dot-active { background: #00b894; box-shadow: 0 0 12px #00b894; }
        h2 { font-size: 1.45rem; line-height: 1.35; color: var(--text); margin-bottom: 25px; font-weight: 600; }
        input { width: 100%; padding: 18px; margin: 10px 0; border-radius: 16px; border: 2px solid #f1f2f6; box-sizing: border-box; font-size: 1rem; outline: none; transition: 0.3s; }
        .option-item { background: var(--light-bg); border: 2px solid #f1f2f6; padding: 18px; margin: 12px 0; border-radius: 18px; cursor: pointer; transition: 0.2s; text-align: left; }
        .option-item.selected { background: #f1f2ff; border-color: var(--secondary); color: var(--secondary); font-weight: 600; }
        .ranking-list .option-item { cursor: grab; display: flex; align-items: center; gap: 15px; }
        textarea { width: 100%; height: 130px; border-radius: 20px; border: 2px solid #f1f2f6; padding: 18px; box-sizing: border-box; font-family: inherit; font-size: 1rem; outline: none; resize: none; }
        button { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; border: none; padding: 20px; width: 100%; border-radius: 20px; font-weight: 600; font-size: 1.1rem; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .hidden { display: none; }
        .result-card { text-align: left; background: #f9f9ff; padding: 25px; border-radius: 22px; border-left: 6px solid var(--secondary); margin-top: 30px; }
        .result-card b { display: block; margin-bottom: 6px; color: var(--secondary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.2px; }
        .footer { margin-top: 40px; color: rgba(255, 255, 255, 0.4); font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <h1 class="brand-title">CB-App</h1>
            <p style="color: var(--muted); margin-bottom: 35px; font-size: 0.95rem;">Euer tägliches Verbindungs-Ritual.</p>
            <input type="email" id="email" placeholder="E-Mail Adresse">
            <input type="password" id="password" placeholder="Passwort">
            <button onclick="app.login()" id="login-btn">Anmelden</button>
        </div>

        <div id="main-screen" class="hidden">
            <h1 class="brand-title" style="font-size: 2rem; margin-bottom: 20px;">Hallo <span id="user-display-name"></span>!</h1>
            <div class="status-badge">
                <span id="partner-name-display">Partner</span> Status: <span id="partner-dot" class="dot"></span>
            </div>
            <h2 id="question-text">Frage lädt...</h2>
            <div id="input-zone">
                <div id="options-list" class="ranking-list"></div>
                <textarea id="text-input" class="hidden" placeholder="Was denkst du dazu?"></textarea>
            </div>
            <button id="save-btn" onclick="app.submit()">Antwort versiegeln</button>
            <div id="complete-view" class="hidden">
                <div class="result-card" id="results-box"></div>
                <button onclick="app.logout()" style="background: transparent; color: var(--muted); box-shadow: none; font-size: 0.8rem; margin-top: 20px;">Abmelden</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://eedbdbqvwpquoxzbunwo.supabase.co";
        const SB_KEY = "Sb_publishable_k7vTHNDeNYoBMlfxx9HISg_vFfdfzpm";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        const app = {
            session: null,
            todayKey: new Date().toISOString().split('T')[0],
            currQ: null,
            myName: "",
            partnerName: "",

            questions: [
                { type: "choice", q: "Was ist unsere größte Stärke als Team?", opts: ["Humor", "Ehrlichkeit", "Kommunikation", "Loyalität"] },
                { type: "ranking", q: "Ranke diese Urlaubs-Arten:", opts: ["City Trip", "Strandurlaub", "Berge & Wandern", "Roadtrip"] },
                { type: "text", q: "Was ist eine kleine Sache, die ich heute für dich tun könnte?", opts: [] },
                { type: "choice", q: "Welches Tier wären wir als Team?", opts: ["Wölfe", "Otter", "Löwen", "Pinguine"] },
                { type: "ranking", q: "Wichtigste Sache im Haushalt?", opts: ["Saubere Küche", "Gemachtes Bett", "Viel Tageslicht", "Leerer Mülleimer"] },
                { type: "text", q: "Beschreibe unseren heutigen Tag in 3 Worten.", opts: [] }
            ],

            async init() {
                const { data } = await sbClient.auth.getSession();
                if (data.session) {
                    this.session = data.session;
                    this.identifyUsers();
                    this.showMain();
                }
            },

            identifyUsers() {
                const email = this.session.user.email.toLowerCase();
                if (email === 'bisf@gmx.de') {
                    this.myName = "Bene";
                    this.partnerName = "Clara";
                } else if (email === 'clara-frey@gmx.de') {
                    this.myName = "Clara";
                    this.partnerName = "Bene";
                }
                document.getElementById('user-display-name').innerText = this.myName;
                document.getElementById('partner-name-display').innerText = this.partnerName;
            },

            async login() {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
                if (error) alert("Fehler: " + error.message);
                else {
                    this.session = data.session;
                    this.identifyUsers();
                    this.showMain();
                }
            },

            async logout() { await sbClient.auth.signOut(); location.reload(); },

            showMain() {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                this.setupContent();
            },

            setupContent() {
                const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
                this.currQ = this.questions[dayOfYear % this.questions.length];
                document.getElementById('question-text').innerText = this.currQ.q;
                
                const list = document.getElementById('options-list');
                const txt = document.getElementById('text-input');
                list.innerHTML = ""; txt.classList.add('hidden');

                if (this.currQ.type === 'text') {
                    txt.classList.remove('hidden');
                } else if (this.currQ.type === 'choice') {
                    this.currQ.opts.forEach(o => {
                        const d = document.createElement('div');
                        d.className = "option-item"; d.innerText = o;
                        d.onclick = () => { 
                            document.querySelectorAll('.option-item').forEach(i => i.classList.remove('selected')); 
                            d.classList.add('selected'); 
                        };
                        list.appendChild(d);
                    });
                } else if (this.currQ.type === 'ranking') {
                    this.currQ.opts.forEach(o => {
                        const d = document.createElement('div'); d.className = "option-item"; d.innerText = o; list.appendChild(d);
                    });
                    Sortable.create(list, { animation: 180 });
                }
                this.syncResults();
            },

            async submit() {
                let val = "";
                if (this.currQ.type === 'text') val = document.getElementById('text-input').value.trim();
                else if (this.currQ.type === 'choice') val = document.querySelector('.option-item.selected')?.innerText;
                else if (this.currQ.type === 'ranking') val = Array.from(document.querySelectorAll('.option-item')).map(i => i.innerText).join(" → ");

                if (!val) return alert("Antwort fehlt noch!");

                const { error } = await sbClient.from('answers').insert([
                    { user_name: this.myName.toLowerCase(), choice: val, day_key: this.todayKey }
                ]);

                if (error) alert("Du hast heute schon geantwortet!");
                else {
                    confetti({ particleCount: 70, spread: 90, origin: { y: 0.6 }, colors: ['#d63031', '#6c5ce7'] });
                    this.syncResults();
                }
            },

            async syncResults() {
                const { data } = await sbClient.from('answers').select('*').eq('day_key', this.todayKey);
                if (data) {
                    const me = data.find(a => a.user_name === this.myName.toLowerCase());
                    const other = data.find(a => a.user_name === this.partnerName.toLowerCase());
                    
                    if (other) document.getElementById('partner-dot').classList.add('dot-active');
                    
                    if (me) {
                        document.getElementById('save-btn').classList.add('hidden');
                        document.getElementById('input-zone').classList.add('hidden');
                        document.getElementById('complete-view').classList.remove('hidden');
                        document.getElementById('results-box').innerHTML = 
                            `<b>Deine Antwort:</b> ${me.choice}<br><br>` + 
                            (other ? `<b>Von ${this.partnerName}:</b> ${other.choice}` : `<i>${this.partnerName} hat noch nicht geantwortet...</i>`);
                    }
                }
            }
        };
        app.init();
    </script>
</body>
</html>
