<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CB-App Ultimate Fix</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff7675; --secondary: #a29bfe; --bg: #0f0c29; 
            --card: #ffffff; --text: #2d3436; --muted: #636e72; 
            --accent-green: #00b894; --light-bg: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Outfit', sans-serif; background: #0f0c29; 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            display: flex; justify-content: center; overflow: hidden;
        }
        
        .container { 
            width: 100%; max-width: 450px; height: 100vh; background: var(--card); 
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
        }

        .header { height: 60px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; border-bottom: 2px solid #f1f2f6; }
        .brand { font-size: 1.4rem; font-weight: 600; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Hauptbereich mit dynamischer Höhe */
        .main-scroll { height: calc(100vh - 170px); overflow-y: auto; padding: 15px 0; -webkit-overflow-scrolling: touch; }

        .footer { height: 100px; display: flex; flex-direction: column; justify-content: center; flex-shrink: 0; background: white; border-top: 2px solid #f1f2f6; gap: 8px; }
        
        .btn-action { 
            width: 100%; padding: 16px; border-radius: 18px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; font-weight: 600; font-size: 1rem; cursor: pointer;
            box-shadow: 0 6px 12px rgba(255, 118, 117, 0.2);
        }
        .btn-secondary { background: #f1f2f6; color: var(--muted); padding: 10px; border-radius: 15px; border: none; font-size: 0.8rem; cursor: pointer; }

        .prog { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .dot { width: 30px; height: 5px; border-radius: 10px; background: #eee; }
        .dot.active { background: var(--secondary); width: 50px; }
        .dot.done { background: var(--accent-green); }

        .info-pill { background: #f1f2ff; border-radius: 12px; padding: 10px; margin-bottom: 15px; font-size: 0.8rem; color: #574b90; border-left: 4px solid var(--secondary); }
        h2 { font-size: 1.2rem; text-align: center; margin-bottom: 15px; }

        /* Ranking Styling */
        .rank-item { background: var(--light-bg); border: 2px solid #edf2f7; padding: 12px; margin-bottom: 8px; border-radius: 15px; display: flex; align-items: center; gap: 12px; cursor: grab; }
        .rank-num { background: var(--secondary); color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; }

        .tot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .tot-box { background: var(--light-bg); border: 2px solid #edf2f7; border-radius: 18px; padding: 25px 10px; text-align: center; font-weight: 600; min-height: 90px; display: flex; align-items: center; justify-content: center; }
        .tot-box.selected { background: var(--primary); color: white; border-color: var(--primary); }

        textarea { width: 100%; height: 120px; border-radius: 18px; border: 2px solid #eee; padding: 15px; font-family: inherit; font-size: 1rem; outline: none; background: var(--light-bg); }

        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .res-card { padding: 10px; border-radius: 12px; font-size: 0.8rem; border: 1px solid #eee; }

        .hidden { display: none !important; }
        .login-field { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 15px; border: 1px solid #eee; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand" id="brand-text">CB-App</div>
        <button id="logout-btn" class="btn-secondary hidden" onclick="app.logout()">Abmelden 🚪</button>
    </div>

    <div id="main-area" class="main-scroll">
        </div>

    <div class="footer" id="footer-ui">
        <button id="action-btn" class="btn-action">Laden...</button>
    </div>
</div>

<script>
    const SB_URL = "https://eedbdbqvwpquoxzbunwo.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZGJkYnF2d3BxdW94emJ1bndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzY0NDEsImV4cCI6MjA5MjI1MjQ0MX0.7RKZjDKvieO-hoCpORQeA9uFcGhLqHNTGwvYiK5ogrs";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const pool = {
        tot: [{q: "Morgenstund?", o: ["Lange schlafen 😴", "Früh sporteln 🏃"], i: "Tippe deine Wahl an!"}],
        ranking: [{q: "Beste Date-Idee?", o: ["Picknick", "Kino", "Kochen", "Wandern"], i: "Halte die Karten und schiebe Platz 1 nach oben."}],
        text: [{q: "Ein Wunsch für uns heute?", o: [], i: "Schreib eine Nachricht für deinen Partner."}]
    };

    const app = {
        user: "", partner: "", day: new Date().toISOString().split('T')[0],
        step: 0, results: [], dailyQs: [], isSubmitting: false,

        async init() {
            // Browser Zurück Logik
            window.onpopstate = (e) => {
                if (e.state) {
                    this.step = e.state.step;
                    this.results = e.state.results;
                    if (e.state.view === 'lobby') this.showLobby(false);
                    if (e.state.view === 'quiz') this.renderQuiz(false);
                    if (e.state.view === 'results') this.showComparison(false);
                }
            };

            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                this.renderLogin();
            } else {
                this.setupUser(session);
            }
        },

        setupUser(session) {
            const email = session.user.email.toLowerCase();
            this.user = email === 'bisf@gmx.de' ? "bene" : "clara";
            this.partner = this.user === "bene" ? "clara" : "bene";
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('brand-text').innerText = "Hi " + this.user.charAt(0).toUpperCase() + this.user.slice(1);
            this.showLobby();
        },

        updateHistory(view) {
            const state = { view, step: this.step, results: [...this.results] };
            history.pushState(state, "");
        },

        async showLobby(push = true) {
            if (push) this.updateHistory('lobby');
            const { data } = await sb.from('answers').select('*').eq('day_key', this.day);
            const me = data?.find(a => a.user_name === this.user);
            const other = data?.find(a => a.user_name === this.partner);

            document.getElementById('main-area').innerHTML = `
                <h2 style="text-align:left;">Dashboard</h2>
                <div style="background:var(--light-bg); border-radius:15px; padding:20px; border:1px solid #eee;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>Ich:</span> <b>${me?'Fertig ✅':'Offen'}</b></div>
                    <div style="display:flex; justify-content:space-between;"><span>${this.partner.toUpperCase()}:</span> <b>${other?'Fertig ✅':'Wartet...'}</b></div>
                </div>
            `;
            const footer = document.getElementById('footer-ui');
            footer.innerHTML = `<button id="action-btn" class="btn-action"></button>`;
            const btn = document.getElementById('action-btn');
            btn.innerText = me ? "Ergebnisse ansehen ✨" : "Heute starten 🚀";
            btn.onclick = () => me ? this.showComparison() : this.startQuiz();
        },

        startQuiz() {
            const seed = parseInt(this.day.replace(/-/g, ''));
            this.dailyQs = [pool.tot[seed % pool.tot.length], pool.ranking[seed % pool.ranking.length], pool.text[seed % pool.text.length]];
            this.step = 0;
            this.results = [];
            this.renderQuiz();
        },

        renderQuiz(push = true) {
            if (push) this.updateHistory('quiz');
            const q = this.dailyQs[this.step];
            document.getElementById('main-area').innerHTML = `
                <div class="prog">${[0,1,2].map(i => `<div class="dot ${i===this.step?'active':(i<this.step?'done':'')}"></div>`).join('')}</div>
                <div class="info-pill"><b>MODUS:</b> ${q.o.length === 2 ? 'This or That' : (q.o.length > 2 ? 'Ranking' : 'Gedanken')}</div>
                <h2>${q.q}</h2>
                <div id="input-container"></div>
            `;

            const container = document.getElementById('input-container');
            if (q.o.length === 2) {
                container.className = "tot-grid";
                q.o.forEach(o => {
                    const d = document.createElement('div'); d.className = "tot-box"; d.innerText = o;
                    d.onclick = () => { document.querySelectorAll('.tot-box').forEach(b => b.classList.remove('selected')); d.classList.add('selected'); };
                    container.appendChild(d);
                });
            } else if (q.o.length > 2) {
                q.o.forEach((o, i) => {
                    const d = document.createElement('div'); d.className = "rank-item";
                    d.innerHTML = `<span class="rank-num">${i+1}</span><span>${o}</span>`; container.appendChild(d);
                });
                new Sortable(container, { animation: 200, forceFallback: true, onEnd: () => { document.querySelectorAll('.rank-num').forEach((n, idx) => n.innerText = idx + 1); }});
            } else {
                container.innerHTML = `<textarea id="text-in" placeholder="Schreib hier..."></textarea>`;
            }

            const btn = document.getElementById('action-btn');
            btn.innerText = this.step < 2 ? "Weiter ✨" : `An ${this.partner} senden ✈️`;
            btn.onclick = () => this.handleNext();
        },

        handleNext() {
            const q = this.dailyQs[this.step];
            let val = "";
            if (q.o.length === 2) val = document.querySelector('.tot-box.selected')?.innerText;
            else if (q.o.length > 2) val = Array.from(document.querySelectorAll('.rank-item span:last-child')).map(s => s.innerText).join(" > ");
            else val = document.getElementById('text-in').value.trim();

            if (!val) return alert("Antwort fehlt!");
            this.results.push(val);
            
            if (this.step < 2) { this.step++; this.renderQuiz(); }
            else this.submit();
        },

        async submit() {
            if (this.isSubmitting) return;
            this.isSubmitting = true;
            const btn = document.getElementById('action-btn');
            btn.disabled = true; btn.innerText = "Sende...";
            
            const { error } = await sb.from('answers').insert([{ user_name: this.user, choice: this.results.join(" | "), day_key: this.day }]);
            this.isSubmitting = false;
            if (error) { alert("Fehler: " + error.message); btn.disabled = false; btn.innerText = "Nochmal versuchen"; }
            else { confetti(); this.showComparison(); }
        },

        async showComparison(push = true) {
            if (push) this.updateHistory('results');
            const { data } = await sb.from('answers').select('*').eq('day_key', this.day);
            const me = data?.find(a => a.user_name === this.user);
            const other = data?.find(a => a.user_name === this.partner);
            const myA = me.choice.split(" | "), otherA = other ? other.choice.split(" | ") : null;

            document.getElementById('main-area').innerHTML = `<h2>Euer Vergleich</h2><div id="res-list"></div>`;
            const seed = parseInt(this.day.replace(/-/g, ''));
            const qs = [pool.tot[seed % pool.tot.length], pool.ranking[seed % pool.ranking.length], pool.text[seed % pool.text.length]];
            
            qs.forEach((q, i) => {
                document.getElementById('res-list').innerHTML += `
                    <div style="margin-bottom:12px;"><div style="font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase;">${q.q}</div>
                    <div class="res-grid">
                        <div class="res-card" style="background:#f1f0ff; border-color:var(--secondary);"><b>ICH</b>${myA[i]}</div>
                        <div class="res-card" style="background:${otherA?'#e3faf3':'#fff1f1'};"><b>${this.partner.toUpperCase()}</b>${otherA ? otherA[i] : '⌛ Wartet...'}</div>
                    </div></div>`;
            });
            
            const footer = document.getElementById('footer-ui');
            footer.innerHTML = `
                <button class="btn-action" onclick="app.showLobby()">Dashboard 🏠</button>
                <button class="btn-secondary" onclick="app.deleteMyAnswer()" style="margin-top:5px;">Antwort korrigieren 📝</button>
            `;
        },

        async deleteMyAnswer() {
            if (!confirm("Deine heutige Antwort wirklich löschen?")) return;
            await sb.from('answers').delete().eq('day_key', this.day).eq('user_name', this.user);
            location.reload();
        },

        renderLogin() {
            document.getElementById('logout-btn').classList.add('hidden');
            document.getElementById('brand-text').innerText = "CB-App";
            document.getElementById('main-area').innerHTML = `
                <h2 style="margin-top:20px;">Anmelden</h2>
                <input id="em" type="email" class="login-field" placeholder="E-Mail">
                <input id="pw" type="password" class="login-field" placeholder="Passwort">
            `;
            const btn = document.getElementById('action-btn');
            btn.innerText = "Einloggen";
            btn.onclick = async () => {
                const { data, error } = await sb.auth.signInWithPassword({ email: document.getElementById('em').value, password: document.getElementById('pw').value });
                if (error) alert("Login Fehler: " + error.message); else location.reload();
            };
        },

        async logout() {
            await sb.auth.signOut();
            location.reload();
        }
    };
    app.init();
</script>
</body>
</html>
