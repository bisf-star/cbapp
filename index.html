<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CB-App Premium</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff7675; --secondary: #a29bfe; --bg: #0f0c29; 
            --card: #ffffff; --text: #2d3436; --muted: #636e72; 
            --accent-green: #00b894; --light-bg: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            font-family: 'Outfit', sans-serif; background: #0f0c29; 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            display: flex; justify-content: center; overflow: hidden;
        }
        
        .container { 
            width: 100%; max-width: 450px; height: 100vh; background: var(--card); 
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 0 0 0;
            position: relative;
        }

        .header { 
            height: 65px; padding: 0 25px; display: flex; 
            justify-content: space-between; align-items: center; flex-shrink: 0;
            border-bottom: 2px solid #f1f2f6;
        }
        .brand { font-size: 1.4rem; font-weight: 600; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logout-btn { background: #f1f2f6; border: none; border-radius: 12px; padding: 8px 16px; font-size: 0.8rem; color: var(--muted); cursor: pointer; font-weight: 600; }

        .content-area { 
            flex-grow: 1; overflow-y: auto; padding: 25px 25px; 
            -webkit-overflow-scrolling: touch; display: flex; flex-direction: column;
        }

        /* FIXED FOOTER - Der Button wird niemals abgeschnitten */
        .footer-bar { 
            padding: 15px 25px calc(30px + env(safe-area-inset-bottom)) 25px; 
            flex-shrink: 0; background: white; border-top: 1px solid #f1f2f6;
            z-index: 10;
        }
        
        .btn-action { 
            width: 100%; padding: 20px; border-radius: 22px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; font-weight: 600; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 118, 117, 0.35);
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .btn-action::after {
            content: ''; position: absolute; top: -50%; left: -100%; width: 100%; height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(25deg); animation: shine 4s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }
        .btn-action:active { transform: scale(0.96); }

        .status-box { background: var(--light-bg); border-radius: 28px; padding: 25px; border: 1px solid #edf2f7; }
        .status-pill { display: inline-flex; align-items: center; gap: 10px; padding: 10px 18px; border-radius: 50px; font-weight: 600; font-size: 0.85rem; }
        .pill-green { background: #e3faf3; color: var(--accent-green); }
        .pill-red { background: #fff1f1; color: var(--primary); animation: pulseStatus 2s infinite; }
        
        @keyframes pulseStatus { 
            0% { transform: scale(1); box-shadow: 0 0 0 0px rgba(255, 118, 117, 0.3); } 
            50% { transform: scale(1.03); box-shadow: 0 0 0 12px rgba(255, 118, 117, 0); } 
            100% { transform: scale(1); box-shadow: 0 0 0 0px rgba(255, 118, 117, 0); } 
        }

        .prog-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .dot { width: 40px; height: 7px; border-radius: 10px; background: #eee; transition: 0.5s; }
        .dot.active { background: var(--secondary); width: 70px; }
        .dot.done { background: var(--accent-green); }

        .info-tab { background: #f1f2ff; border-radius: 18px; padding: 15px; margin-bottom: 25px; font-size: 0.85rem; color: #574b90; border-left: 6px solid var(--secondary); }

        .rank-card { background: var(--light-bg); border: 2px solid #edf2f7; padding: 18px; margin-bottom: 12px; border-radius: 22px; display: flex; align-items: center; gap: 18px; cursor: grab; }
        .rank-tag { background: var(--secondary); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 600; }

        .tot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .tot-box { background: var(--light-bg); border: 2px solid #edf2f7; border-radius: 28px; padding: 35px 15px; text-align: center; font-weight: 600; min-height: 110px; display: flex; align-items: center; justify-content: center; }
        .tot-box.selected { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255, 118, 117, 0.2); }

        textarea { width: 100%; height: 160px; border-radius: 28px; border: 2px solid #eee; padding: 20px; font-family: inherit; font-size: 1.1rem; outline: none; background: var(--light-bg); }

        .res-bubble { padding: 15px; border-radius: 22px; font-size: 0.9rem; border: 1px solid #eee; min-height: 80px; display: flex; flex-direction: column; }
        .res-bubble b { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }

        .hidden { display: none !important; }
        .login-field { width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 20px; border: 2px solid #eee; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand" id="nav-label">CB-App</div>
        <button id="logout-btn" class="logout-btn hidden" onclick="app.logout()">Logout</button>
    </div>

    <div id="main-content" class="content-area"></div>

    <div id="footer-ui" class="footer-bar hidden">
        <button id="action-btn" class="btn-action">Einen Moment...</button>
    </div>
</div>

<script>
    const SB_URL = "https://eedbdbqvwpquoxzbunwo.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZGJkYnF2d3BxdW94emJ1bndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzY0NDEsImV4cCI6MjA5MjI1MjQ0MX0.7RKZjDKvieO-hoCpORQeA9uFcGhLqHNTGwvYiK5ogrs";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const pool = {
        tot: [{q: "Morgenstund?", o: ["Ausschlafen 😴", "Früh sporteln 🏃"], i: "Was passt heute?"}],
        ranking: [{q: "Beste Date-Idee?", o: ["Picknick 🧺", "Kino 🎬", "Kochen 🍳", "Wandern 🥾"], i: "Schiebe deine Favoriten nach oben."}],
        text: [{q: "Was schätzt du heute an uns?", o: [], i: "Ein kleiner Satz für euch."}]
    };

    const greetings = ["Schön, dass du da bist, ", "Toll, dass es dich gibt, ", "Hi, ", "Ein Moment für euch, ", "Genieße den Tag, "];

    const app = {
        user: "", partner: "", day: new Date().toISOString().split('T')[0],
        step: 0, results: [], dailyQs: [], isSubmitting: false,

        async init() {
            window.onpopstate = (e) => { if(e.state) location.reload(); };
            const { data: { session } } = await sb.auth.getSession();
            if (!session) return this.renderLogin();
            
            const email = session.user.email.toLowerCase();
            const rawName = email === 'bisf@gmx.de' ? "Bene" : "Clara";
            this.user = rawName;
            this.partner = this.user === "Bene" ? "Clara" : "Bene";
            
            document.getElementById('logout-btn').classList.remove('hidden');
            this.showLobby();
        },

        async showLobby(push = true) {
            if (push) history.pushState({view: 'lobby'}, "");
            const { data } = await sb.from('answers').select('*').eq('day_key', this.day);
            const me = data?.find(a => a.user_name.toLowerCase() === this.user.toLowerCase());
            const other = data?.find(a => a.user_name.toLowerCase() === this.partner.toLowerCase());

            const greet = greetings[Math.floor(Math.random() * greetings.length)];
            document.getElementById('nav-label').innerText = "CB-App";
            
            document.getElementById('main-content').innerHTML = `
                <h2 style="text-align:left; font-size: 1.8rem; margin-bottom: 8px;">${greet}${this.user}! ❤️</h2>
                <p style="color:var(--muted); margin-bottom: 30px;">Bereit für euren täglichen Vergleich?</p>
                <div class="status-box">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <span>Dein Status:</span> 
                        <span class="status-pill ${me?'pill-green':'pill-red'}">${me?'Fertig ✅':'Offen'}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span>${this.partner}:</span> 
                        <span class="status-pill ${other?'pill-green':'pill-red'}">${other?'Fertig ✅':'Wartet...'}</span>
                    </div>
                </div>
            `;
            const footer = document.getElementById('footer-ui');
            footer.classList.remove('hidden');
            const btn = document.getElementById('action-btn');
            btn.innerText = me ? "Ergebnisse ansehen ✨" : "Heute starten 🚀";
            btn.onclick = () => me ? this.showComparison() : this.startQuiz();
        },

        startQuiz() {
            const seed = parseInt(this.day.replace(/-/g, ''));
            this.dailyQs = [pool.tot[seed % pool.tot.length], pool.ranking[seed % pool.ranking.length], pool.text[seed % pool.text.length]];
            this.step = 0; this.results = []; this.renderQuiz();
        },

        renderQuiz(push = true) {
            if (push) history.pushState({view: 'quiz', step: this.step, results: [...this.results]}, "");
            const q = this.dailyQs[this.step];
            document.getElementById('nav-label').innerText = "Frage " + (this.step + 1);
            
            document.getElementById('main-content').innerHTML = `
                <div class="prog-dots">${[0,1,2].map(i => `<div class="dot ${i===this.step?'active':(i<this.step?'done':'')}"></div>`).join('')}</div>
                <div class="info-tab"><b>Vorschlag:</b> ${q.i}</div>
                <h2 style="font-size: 1.4rem;">${q.q}</h2>
                <div id="quiz-input"></div>
            `;

            const wrap = document.getElementById('quiz-input');
            if (q.o.length === 2) {
                wrap.className = "tot-grid";
                q.o.forEach(o => {
                    const d = document.createElement('div'); d.className = "tot-box"; d.innerText = o;
                    d.onclick = () => { document.querySelectorAll('.tot-box').forEach(b => b.classList.remove('selected')); d.classList.add('selected'); };
                    wrap.appendChild(d);
                });
            } else if (q.o.length > 2) {
                q.o.forEach((o, i) => {
                    const d = document.createElement('div'); d.className = "rank-card";
                    d.innerHTML = `<span class="rank-tag">${i+1}</span><span>${o}</span>`; wrap.appendChild(d);
                });
                new Sortable(wrap, { animation: 250, forceFallback: true, onEnd: () => { document.querySelectorAll('.rank-tag').forEach((n, idx) => n.innerText = idx + 1); }});
            } else {
                wrap.innerHTML = `<textarea id="txt-val" placeholder="Deine Gedanken hier..."></textarea>`;
            }

            const btn = document.getElementById('action-btn');
            btn.innerText = this.step < 2 ? "Weiter ✨" : `Fertig & Senden ✈️`;
            btn.onclick = () => this.handleNext();
        },

        handleNext() {
            const q = this.dailyQs[this.step];
            let val = "";
            if (q.o.length === 2) val = document.querySelector('.tot-box.selected')?.innerText;
            else if (q.o.length > 2) val = Array.from(document.querySelectorAll('.rank-card span:last-child')).map(s => s.innerText).join(" > ");
            else val = document.getElementById('txt-val').value.trim();

            if (!val) return alert("Antwort fehlt noch! ✨");
            this.results.push(val);
            if (this.step < 2) { this.step++; this.renderQuiz(); }
            else this.submit();
        },

        async submit() {
            if (this.isSubmitting) return;
            this.isSubmitting = true;
            const btn = document.getElementById('action-btn');
            btn.disabled = true; btn.innerText = "Sende Daten...";
            
            const { error } = await sb.from('answers').insert([{ user_name: this.user.toLowerCase(), choice: this.results.join(" | "), day_key: this.day }]);
            this.isSubmitting = false;
            if (error) { alert("Senden fehlgeschlagen! Fehler: " + error.message); btn.disabled = false; btn.innerText = "Nochmal versuchen"; }
            else { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); this.showComparison(); }
        },

        async showComparison(push = true) {
            if (push) history.pushState({view: 'results'}, "");
            const { data } = await sb.from('answers').select('*').eq('day_key', this.day);
            const me = data?.find(a => a.user_name.toLowerCase() === this.user.toLowerCase());
            const other = data?.find(a => a.user_name.toLowerCase() === this.partner.toLowerCase());
            const myA = me.choice.split(" | "), otherA = other ? other.choice.split(" | ") : null;

            document.getElementById('nav-label').innerText = "Euer Vergleich";
            let html = `<h2 style="text-align:left; font-size: 1.8rem; margin-bottom: 25px;">Ergebnisse</h2>`;
            this.dailyQs.forEach((q, i) => {
                html += `
                    <div style="margin-bottom:20px;">
                        <div style="font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; margin-bottom:10px;">${q.q}</div>
                        <div class="tot-grid">
                            <div class="res-bubble" style="background:#f1f0ff; border-color:var(--secondary);"><b>ICH</b>${myA[i]}</div>
                            <div class="res-bubble" style="background:${otherA?'#e3faf3':'#fff1f1'};"><b>${this.partner.toUpperCase()}</b>${otherA ? otherA[i] : 'Wartet...'}</div>
                        </div>
                    </div>`;
            });
            html += `<button class="btn-action" style="background:#f1f2f6; color:var(--muted); box-shadow:none; margin-top:10px; animation:none;" id="del-btn">Antwort korrigieren 📝</button>`;
            
            document.getElementById('main-content').innerHTML = html;
            const btn = document.getElementById('action-btn');
            btn.innerText = "Zurück zum Start 🏠";
            btn.onclick = () => this.showLobby();

            document.getElementById('del-btn').onclick = async () => {
                if (confirm("Möchtest du deine heutigen Antworten wirklich löschen und neu starten?")) {
                    await sb.from('answers').delete().eq('day_key', this.day).eq('user_name', this.user.toLowerCase());
                    location.reload();
                }
            };
        },

        renderLogin() {
            document.getElementById('logout-btn').classList.add('hidden');
            document.getElementById('main-content').innerHTML = `
                <h2 style="margin-top:30px; text-align:left; font-size: 2rem;">CB-App</h2>
                <p style="color:var(--muted); margin-bottom:35px;">Log dich ein, um euren Moment zu starten.</p>
                <input id="em" type="email" class="login-field" placeholder="E-Mail Adresse">
                <input id="pw" type="password" class="login-field" placeholder="Passwort">
            `;
            const footer = document.getElementById('footer-ui');
            footer.classList.remove('hidden');
            const btn = document.getElementById('action-btn');
            btn.innerText = "Einloggen ✨";
            btn.onclick = async () => {
                const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('em').value, password: document.getElementById('pw').value });
                if (error) alert("Login fehlgeschlagen!"); else location.reload();
            };
        },
        logout() { sb.auth.signOut().then(() => location.reload()); }
    };
    app.init();
</script>
</body>
</html>
