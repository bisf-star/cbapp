<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CB-App</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff7675; --secondary: #a29bfe; --bg: #0f0c29; 
            --card: rgba(255, 255, 255, 0.98); --text: #2d3436; 
            --muted: #636e72; --accent-green: #00b894; --accent-red: #fab1a0; --light-bg: #f8fafc;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top right, #2d3436, #0f0c29); 
            margin: 0; padding: 0; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; color: var(--text); overflow: hidden;
        }
        
        .container { 
            width: 100%; max-width: 450px; height: 100vh;
            background: var(--card); 
            display: flex; flex-direction: column;
            padding: 20px 20px env(safe-area-inset-bottom);
            position: relative;
        }

        /* Kopfzeile Fix */
        .header-nav {
            display: flex; justify-content: space-between; align-items: flex-start;
            min-height: 80px; padding-top: 10px; width: 100%;
        }

        .logout-btn { 
            background: none; border: none; cursor: pointer; color: var(--muted); padding: 5px;
        }
        .logout-svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; }

        .brand-title { 
            font-size: 1.8rem; font-weight: 600; letter-spacing: -1px; 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            line-height: 1.2; text-align: left; max-width: 80%;
        }

        /* Info-Fenster pro Kategorie */
        .mode-explanation {
            background: #f1f2ff; border-radius: 15px; padding: 12px 15px;
            margin-bottom: 15px; border-left: 4px solid var(--secondary);
            text-align: left; font-size: 0.85rem; color: #574b90;
        }
        .mode-explanation b { display: block; text-transform: uppercase; font-size: 0.7rem; margin-bottom: 2px; }

        /* Quiz UI */
        .progress-container { display: flex; justify-content: center; gap: 6px; margin: 5px 0 15px 0; }
        .progress-dot { width: 20px; height: 5px; border-radius: 10px; background: #dfe4ea; transition: 0.4s; }
        .progress-dot.active { background: var(--secondary); width: 40px; }
        .progress-dot.done { background: var(--accent-green); }
        
        h2 { font-size: 1.15rem; margin: 0 0 15px 0; font-weight: 600; line-height: 1.3; text-align: center; }

        #input-zone { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; padding-bottom: 20px; }

        /* Ranking mit Zahlen */
        .option-item { 
            background: var(--light-bg); border: 2px solid #edf2f7; padding: 14px; margin: 6px 0; 
            border-radius: 18px; text-align: left; display: flex; align-items: center; gap: 12px; 
            font-size: 0.95rem; touch-action: none; position: relative;
        }
        .ranking-number {
            background: var(--secondary); color: white; width: 22px; height: 22px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 600; flex-shrink: 0;
        }

        .tot-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tot-item { 
            background: var(--light-bg); border: 2px solid #edf2f7; border-radius: 20px; 
            padding: 20px 10px; cursor: pointer; font-weight: 600; font-size: 1rem; 
            min-height: 100px; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .tot-item.selected { background: var(--primary); color: white; border-color: var(--primary); }
        
        textarea { 
            width: 100%; height: 120px; border-radius: 20px; border: 2px solid #edf2f7; 
            padding: 15px; font-family: inherit; font-size: 1rem; outline: none; resize: none; background: var(--light-bg); 
        }
        
        .btn-action { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); 
            color: white; border: none; padding: 20px; width: 100%; border-radius: 22px; 
            font-weight: 600; font-size: 1.05rem; cursor: pointer; margin-top: 10px;
            box-shadow: 0 8px 15px rgba(255, 118, 117, 0.2);
        }

        /* Ergebnisse */
        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .res-bubble { padding: 12px; border-radius: 15px; font-size: 0.8rem; min-height: 50px; display: flex; flex-direction: column; }
        .bubble-me { background: #f1f0ff; border: 1px solid var(--secondary); }
        .bubble-partner { background: #fff1f1; border: 1px solid #fab1a0; }
        .bubble-partner.ready { background: #e3faf3; border-color: var(--accent-green); }
        
        .hidden { display: none !important; }
        .login-field { width: 100%; padding: 18px; margin: 8px 0; border-radius: 15px; border: 2px solid #eee; box-sizing: border-box; font-size: 1rem; outline: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-nav">
            <h1 id="header-text" class="brand-title">CB-App</h1>
            <button id="logout-icon" class="logout-btn hidden" onclick="app.logout()">
                <svg class="logout-svg" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            </button>
        </div>

        <div id="login-screen" class="hidden">
            <p style="color: var(--muted); margin-bottom: 30px;">Euer täglicher Moment.</p>
            <input type="email" id="email" class="login-field" placeholder="E-Mail">
            <input type="password" id="password" class="login-field" placeholder="Passwort">
            <button onclick="app.login()" class="btn-action" style="background: var(--bg);">Einloggen</button>
        </div>

        <div id="lobby-screen" class="hidden">
            <p id="today-date" style="color: var(--muted); font-size: 0.9rem; margin-bottom: 20px;"></p>
            <div style="background: var(--light-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>Deine Antwort:</span><span id="my-status"></span></div>
                <div style="display:flex; justify-content:space-between;"><span id="p-name-label">Partner:</span><span id="p-status"></span></div>
            </div>
            <button id="start-btn" class="btn-action" onclick="app.startQuiz()">Loslegen 🚀</button>
        </div>

        <div id="quiz-view" class="hidden" style="flex-grow:1; display:flex; flex-direction:column;">
            <div class="progress-container">
                <div id="p-dot-0" class="progress-dot"></div>
                <div id="p-dot-1" class="progress-dot"></div>
                <div id="p-dot-2" class="progress-dot"></div>
            </div>
            
            <div id="mode-info" class="mode-explanation">
                <b id="mode-title-ui">MODUS</b>
                <span id="mode-desc-ui">Erklärung...</span>
            </div>

            <h2 id="question-text">...</h2>
            
            <div id="input-zone">
                <div id="options-list"></div>
                <div id="tot-zone" class="tot-container hidden"></div>
                <textarea id="text-input" class="hidden" placeholder="Was denkst du gerade?"></textarea>
            </div>
            
            <button id="next-btn" class="btn-action" onclick="app.nextStep()">Weiter ✨</button>
        </div>

        <div id="complete-view" class="hidden" style="overflow-y: auto;">
            <div id="results-display"></div>
            <button style="background:none; border:none; color:#bbb; padding:15px; font-size:0.75rem; width:100%;" onclick="app.resetToday()">Antworten korrigieren 📝</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://eedbdbqvwpquoxzbunwo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZGJkYnF2d3BxdW94emJ1bndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzY0NDEsImV4cCI6MjA5MjI1MjQ0MX0.7RKZjDKvieO-hoCpORQeA9uFcGhLqHNTGwvYiK5ogrs";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        const pool = {
            tot: [{q: "Morgenstund?", o: ["Ausschlafen 😴", "Vollgas 🏃"], info: "ENTSCHEIDE DICH: Wähle eine der beiden Kacheln aus."}, {q: "Abend-Vibe?", o: ["Couch 🍿", "Action 🍻"], info: "ENTSCHEIDE DICH: Was passt heute besser zu dir?"}, {q: "Pizza?", o: ["Ananas 🍍", "Niemals! 🚫"], info: "ENTSCHEIDE DICH: Die ewige Frage..."}],
            ranking: [{q: "Wichtigste Säule?", o: ["Vertrauen", "Humor", "Ehrlichkeit", "Leidenschaft"], info: "RANKING: Schiebe das Wichtigste auf Platz 1."}, {q: "Beste Date-Idee?", o: ["Picknick", "Kino", "Kochen", "Wandern"], info: "RANKING: Sortiere nach deiner persönlichen Vorliebe."}],
            text: [{q: "Drei Worte für unseren Tag.", o: [], info: "GEDANKEN: Schreib einen kurzen Text für deinen Partner."}, {q: "Was sollten wir bald mal machen?", o: [], info: "GEDANKEN: Ein kleiner Wunsch oder Vorschlag."}]
        };

        const app = {
            session: null, todayKey: new Date().toISOString().split('T')[0],
            myName: "", partnerName: "", currentStep: 0, dailyQuestions: [], myAnswers: [], meAnswered: false,

            async init() {
                const { data: { session } } = await sbClient.auth.getSession();
                if (session) { 
                    this.session = session; this.identifyUsers(); this.generateDailyQuestions(); 
                    document.getElementById('logout-icon').classList.remove('hidden');
                    this.syncLobby(); 
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            },

            identifyUsers() {
                const email = this.session.user.email.toLowerCase();
                if (email === 'bisf@gmx.de') { this.myName = "Bene"; this.partnerName = "Clara"; }
                else if (email === 'clara-frey@gmx.de') { this.myName = "Clara"; this.partnerName = "Bene"; }
                document.getElementById('header-text').innerText = `Hi ${this.myName}!`;
                document.getElementById('p-name-label').innerText = this.partnerName + ":";
            },

            generateDailyQuestions() {
                const seed = parseInt(this.todayKey.replace(/-/g, ''));
                const getQ = (list, offset) => list[(seed + offset) % list.length];
                this.dailyQuestions = [{...getQ(pool.tot, 0), type: 'tot'}, {...getQ(pool.ranking, 1), type: 'ranking'}, {...getQ(pool.text, 2), type: 'text'}];
            },

            async syncLobby() {
                document.getElementById('today-date').innerText = new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
                const { data } = await sbClient.from('answers').select('*').eq('day_key', this.todayKey);
                const me = data?.find(a => a.user_name === this.myName.toLowerCase());
                const other = data?.find(a => a.user_name === this.partnerName.toLowerCase());
                this.meAnswered = !!me;
                document.getElementById('my-status').innerText = this.meAnswered ? "Erledigt ✅" : "Offen ⏳";
                document.getElementById('p-status').innerText = other ? "Fertig ✅" : "Überlegt noch ⏳";
                document.getElementById('start-btn').innerText = this.meAnswered ? "Ergebnisse ansehen ✨" : "Jetzt loslegen 🚀";
                document.getElementById('lobby-screen').classList.remove('hidden');
                document.getElementById('login-screen').classList.add('hidden');
            },

            startQuiz() {
                if(this.meAnswered) this.showResults();
                else {
                    document.getElementById('lobby-screen').classList.add('hidden');
                    document.getElementById('quiz-view').classList.remove('hidden');
                    this.renderStep();
                }
            },

            renderStep() {
                if (this.currentStep > 2) return;
                document.getElementById('next-btn').innerText = (this.currentStep < 2) ? "Weiter ✨" : `An ${this.partnerName} schicken ✈️`;
                for(let i=0; i<3; i++) document.getElementById(`p-dot-${i}`).className = 'progress-dot' + (i === this.currentStep ? ' active' : (i < this.currentStep ? ' done' : ''));
                
                const q = this.dailyQuestions[this.currentStep];
                document.getElementById('question-text').innerText = q.q;
                document.getElementById('mode-desc-ui').innerText = q.info;
                document.getElementById('mode-title-ui').innerText = q.type === 'tot' ? 'This or That' : (q.type === 'ranking' ? 'Ranking' : 'Gedanken');

                const list = document.getElementById('options-list');
                const tot = document.getElementById('tot-zone');
                const txt = document.getElementById('text-input');
                list.innerHTML = ""; tot.innerHTML = "";
                list.classList.add('hidden'); tot.classList.add('hidden'); txt.classList.add('hidden');

                if (q.type === 'tot') {
                    tot.classList.remove('hidden');
                    q.o.forEach(opt => {
                        const div = document.createElement('div'); div.className = 'tot-item'; div.innerText = opt;
                        div.onclick = () => { document.querySelectorAll('.tot-item').forEach(i => i.classList.remove('selected')); div.classList.add('selected'); };
                        tot.appendChild(div);
                    });
                } else if (q.type === 'ranking') {
                    list.classList.remove('hidden');
                    q.o.forEach((opt, idx) => { 
                        const div = document.createElement('div'); div.className = 'option-item';
                        div.innerHTML = `<span class="ranking-number">${idx+1}</span> <span>${opt}</span>`;
                        list.appendChild(div); 
                    });
                    Sortable.create(list, { 
                        animation: 200, forceFallback: true,
                        onEnd: () => {
                            document.querySelectorAll('.ranking-number').forEach((num, i) => num.innerText = i + 1);
                        }
                    });
                } else if (q.type === 'text') {
                    txt.classList.remove('hidden'); txt.value = "";
                }
            },

            nextStep() {
                let ans = "";
                const q = this.dailyQuestions[this.currentStep];
                if (q.type === 'tot') ans = document.querySelector('.tot-item.selected')?.innerText;
                else if (q.type === 'ranking') ans = Array.from(document.querySelectorAll('.option-item')).map(i => i.innerText.replace(/[0-9]/g, '').trim()).join(" > ");
                else if (q.type === 'text') ans = document.getElementById('text-input').value.trim();
                
                if (!ans) return alert("Antwort fehlt! ✨");
                this.myAnswers.push(ans);
                this.currentStep++;
                if (this.currentStep < 3) this.renderStep();
                else this.submitAll();
            },

            async submitAll() {
                const { error } = await sbClient.from('answers').insert([{ user_name: this.myName.toLowerCase(), choice: this.myAnswers.join(" | "), day_key: this.todayKey }]);
                if (!error) { confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); this.meAnswered = true; this.showResults(); }
            },

            async showResults() {
                const { data } = await sbClient.from('answers').select('*').eq('day_key', this.todayKey);
                const me = data?.find(a => a.user_name === this.myName.toLowerCase());
                const other = data?.find(a => a.user_name === this.partnerName.toLowerCase());
                document.getElementById('lobby-screen').classList.add('hidden');
                document.getElementById('quiz-view').classList.add('hidden');
                document.getElementById('complete-view').classList.remove('hidden');
                const myS = me.choice.split(" | "), otherS = other ? other.choice.split(" | ") : null;
                let h = "";
                this.dailyQuestions.forEach((q, i) => {
                    h += `<div style="margin-top:20px;"><div style="font-size:0.75rem; color:#999; text-transform:uppercase; margin-bottom:5px;">${q.q}</div><div class="comparison-grid">
                        <div class="res-bubble bubble-me"><span style="font-size:0.6rem; opacity:0.6;">Ich</span>${myS[i]}</div>
                        <div class="res-bubble bubble-partner ${otherS ? 'ready' : ''}"><span style="font-size:0.6rem; opacity:0.6;">${this.partnerName}</span>${otherS ? otherS[i] : 'Wartet...'}</div>
                    </div></div>`;
                });
                document.getElementById('results-display').innerHTML = h;
            },

            async resetToday() {
                if(confirm("Antworten neu schreiben?")) {
                    await sbClient.from('answers').delete().eq('day_key', this.todayKey).eq('user_name', this.myName.toLowerCase());
                    location.reload();
                }
            },

            async login() {
                const e = document.getElementById('email').value.trim(), p = document.getElementById('password').value;
                const { error } = await sbClient.auth.signInWithPassword({ email: e, password: p });
                if (error) alert(error.message); else location.reload();
            },

            async logout() { await sbClient.auth.signOut(); location.reload(); }
        };
        app.init();
    </script>
</body>
</html>
