<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CB-App</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff7675; --secondary: #a29bfe; --bg: #0f0c29; 
            --card: rgba(255, 255, 255, 0.98); --text: #2d3436; 
            --muted: #636e72; --accent-green: #00b894; --accent-red: #fab1a0; --light-bg: #f8fafc;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top right, #2d3436, #0f0c29); 
            margin: 0; padding: 0; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; color: var(--text); 
            overflow: hidden;
        }
        
        .container { 
            width: 100%; max-width: 450px; height: 100vh;
            background: var(--card); 
            display: flex; flex-direction: column;
            padding: 20px 20px env(safe-area-inset-bottom);
            position: relative;
        }

        @media (min-width: 500px) {
            .container { min-height: 80vh; height: auto; border-radius: 40px; }
        }

        .logout-btn { 
            position: absolute; top: 20px; right: 20px; background: none; border: none; 
            cursor: pointer; color: var(--muted); padding: 5px; z-index: 10; 
        }
        .logout-svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }

        .brand-title { 
            font-size: 2rem; font-weight: 600; letter-spacing: -1.5px; 
            margin: 0; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            line-height: 1.2; margin-top: 5px;
        }

        .lobby-card { background: var(--light-bg); border-radius: 20px; padding: 15px; margin: 15px 0; border: 1px solid #eee; }
        .lobby-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.9rem; }
        .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .pill-done { background: #e3faf3; color: var(--accent-green); }
        .pill-wait { background: #fff1f1; color: var(--accent-red); }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        .dot-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.4; } 100% { transform: scale(1); opacity: 1; } }

        .progress-container { display: flex; justify-content: center; gap: 6px; margin: 10px 0; }
        .progress-dot { width: 25px; height: 5px; border-radius: 10px; background: #dfe4ea; transition: 0.4s; }
        .progress-dot.active { background: var(--secondary); width: 45px; }
        .progress-dot.done { background: var(--accent-green); }
        
        h2 { font-size: 1.1rem; margin: 10px 0 15px 0; font-weight: 600; line-height: 1.3; text-align: center; }

        #input-zone { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; overflow-y: auto; }

        .option-item { background: var(--light-bg); border: 2px solid #edf2f7; padding: 14px; margin: 6px 0; border-radius: 18px; text-align: left; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; touch-action: none; }
        .tot-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .tot-item { background: var(--light-bg); border: 2px solid #edf2f7; border-radius: 20px; padding: 25px 10px; cursor: pointer; font-weight: 600; font-size: 0.9rem; min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .tot-item.selected { background: var(--primary); color: white; border-color: var(--primary); }
        
        textarea { width: 100%; height: 100px; border-radius: 20px; border: 2px solid #edf2f7; padding: 15px; font-family: inherit; font-size: 1rem; outline: none; resize: none; background: var(--light-bg); }
        
        .btn-action { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); 
            color: white; border: none; padding: 18px; width: 100%; border-radius: 20px; 
            font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 15px;
        }

        .result-block { margin-top: 15px; text-align: left; width: 100%; }
        .question-header { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .res-bubble { padding: 12px; border-radius: 15px; font-size: 0.8rem; min-height: 50px; display: flex; flex-direction: column; justify-content: center; }
        .bubble-me { background: #f1f0ff; border: 1px solid var(--secondary); }
        .bubble-partner { background: #fff1f1; border: 1px solid #fab1a0; }
        .bubble-partner.ready { background: #e3faf3; border-color: var(--accent-green); }
        .bubble-label { font-size: 0.6rem; font-weight: 600; margin-bottom: 3px; opacity: 0.6; }
        
        .hidden { display: none !important; }
        .login-field { width: 100%; padding: 16px; margin: 8px 0; border-radius: 15px; border: 2px solid #eee; box-sizing: border-box; font-size: 1rem; outline: none; }
    </style>
</head>
<body>

    <div class="container">
        <button id="logout-icon" class="logout-btn hidden" onclick="app.logout()">
            <svg class="logout-svg" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>

        <div id="login-screen" class="hidden">
            <h1 class="brand-title">CB-App</h1>
            <p style="color: var(--muted); margin: 5px 0 20px 0; font-size: 0.9rem;">Euer täglicher Moment.</p>
            <input type="email" id="email" class="login-field" placeholder="E-Mail">
            <input type="password" id="password" class="login-field" placeholder="Passwort">
            <button onclick="app.login()" id="login-btn" class="btn-action" style="background: var(--bg);">Einloggen</button>
        </div>

        <div id="lobby-screen" class="hidden">
            <h1 id="welcome-msg" class="brand-title">Willkommen</h1>
            <p id="today-date" style="color: var(--muted); font-size: 0.9rem; margin: 5px 0;"></p>
            <div class="lobby-card">
                <div class="lobby-item"><span>Deine Antwort:</span><span id="my-lobby-status" class="status-pill"></span></div>
                <div class="lobby-item"><span id="partner-lobby-name">Partner:</span><span id="partner-lobby-status" class="status-pill"></span></div>
            </div>
            <button id="start-btn" class="btn-action" onclick="app.startQuiz()">Loslegen 🚀</button>
        </div>

        <div id="quiz-view" class="hidden" style="flex-grow: 1; display: flex; flex-direction: column;">
            <div class="progress-container">
                <div id="p-dot-0" class="progress-dot"></div>
                <div id="p-dot-1" class="progress-dot"></div>
                <div id="p-dot-2" class="progress-dot"></div>
            </div>
            <h2 id="question-text">...</h2>
            <div id="input-zone">
                <div id="options-list"></div>
                <div id="tot-zone" class="tot-container hidden"></div>
                <textarea id="text-input" class="hidden" placeholder="Deine Gedanken..."></textarea>
            </div>
            <button id="next-btn" class="btn-action" onclick="app.nextStep()">Weiter ✨</button>
        </div>

        <div id="complete-view" class="hidden" style="overflow-y: auto; flex-grow: 1;">
            <h1 class="brand-title" style="font-size: 1.8rem;">Eure Sicht</h1>
            <div id="results-display"></div>
            <button style="background:none; border:none; color:#bbb; padding:15px; font-size:0.75rem; cursor:pointer; width: 100%;" onclick="app.resetToday()">Antworten korrigieren 📝</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://eedbdbqvwpquoxzbunwo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZGJkYnF2d3BxdW94emJ1bndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzY0NDEsImV4cCI6MjA5MjI1MjQ0MX0.7RKZjDKvieO-hoCpORQeA9uFcGhLqHNTGwvYiK5ogrs";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        const pool = {
            tot: [{q: "Morgenstund?", o: ["Ausschlafen 😴", "Vollgas 🏃"]}, {q: "Abend-Vibe?", o: ["Couch 🍿", "Action 🍻"]}, {q: "Reise?", o: ["Berge 🏔️", "Strand 🌊"]}, {q: "Pizza?", o: ["Ananas 🍍", "Niemals! 🚫"]}],
            ranking: [{q: "Wichtigste Säule?", o: ["Vertrauen", "Humor", "Ehrlichkeit", "Leidenschaft"]}, {q: "Date-Idee?", o: ["Picknick", "Kino", "Kochen", "Wandern"]}],
            text: [{q: "Drei Worte für unseren Tag.", o: []}, {q: "Was sollten wir bald mal machen?", o: []}]
        };

        const greetings = ["Schön, dass du da bist,", "Toll, dass es dich gibt,", "Hi mein Schatz,", "Zeit für euch,", "Geniess den Tag,"];

        const app = {
            session: null, todayKey: new Date().toISOString().split('T')[0],
            myName: "", partnerName: "", currentStep: 0, dailyQuestions: [], myAnswers: [], meAnswered: false,

            async init() {
                const { data: { session } } = await sbClient.auth.getSession();
                if (session) { 
                    this.session = session; this.identifyUsers(); this.generateDailyQuestions(); 
                    document.getElementById('logout-icon').classList.remove('hidden');
                    this.syncLobby(); 
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            },

            identifyUsers() {
                const email = this.session.user.email.toLowerCase();
                if (email === 'bisf@gmx.de') { this.myName = "Bene"; this.partnerName = "Clara"; }
                else if (email === 'clara-frey@gmx.de') { this.myName = "Clara"; this.partnerName = "Bene"; }
                const greet = greetings[Math.floor(Math.random() * greetings.length)];
                document.getElementById('welcome-msg').innerText = `${greet} ${this.myName}!`;
                document.getElementById('partner-lobby-name').innerText = this.partnerName + ":";
            },

            generateDailyQuestions() {
                const seed = parseInt(this.todayKey.replace(/-/g, ''));
                const getQ = (list, offset) => list[(seed + offset) % list.length];
                this.dailyQuestions = [{...getQ(pool.tot, 0), type: 'tot'}, {...getQ(pool.ranking, 1), type: 'ranking'}, {...getQ(pool.text, 2), type: 'text'}];
            },

            async syncLobby() {
                document.getElementById('today-date').innerText = new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });
                const { data } = await sbClient.from('answers').select('*').eq('day_key', this.todayKey);
                const me = data?.find(a => a.user_name === this.myName.toLowerCase());
                const other = data?.find(a => a.user_name === this.partnerName.toLowerCase());
                
                this.meAnswered = !!me;
                const otherDone = !!other;

                document.getElementById('my-lobby-status').innerHTML = this.meAnswered ? 'Fertig ✅' : '<span class="dot dot-pulse"></span> Offen';
                document.getElementById('my-lobby-status').className = "status-pill " + (this.meAnswered ? "pill-done" : "pill-wait");
                document.getElementById('partner-lobby-status').innerHTML = otherDone ? 'Erledigt ✅' : '<span class="dot dot-pulse"></span> Überlegt...';
                document.getElementById('partner-lobby-status').className = "status-pill " + (otherDone ? "pill-done" : "pill-wait");

                document.getElementById('start-btn').innerText = this.meAnswered ? "Ergebnisse ansehen ✨" : "Jetzt loslegen 🚀";
                document.getElementById('lobby-screen').classList.remove('hidden');
                document.getElementById('login-screen').classList.add('hidden');
            },

            startQuiz() {
                if(this.meAnswered) this.showResults();
                else {
                    document.getElementById('lobby-screen').classList.add('hidden');
                    document.getElementById('quiz-view').classList.remove('hidden');
                    this.renderStep();
                }
            },

            renderStep() {
                if (this.currentStep > 2) return;
                document.getElementById('next-btn').innerText = (this.currentStep < 2) ? "Weiter ✨" : `An ${this.partnerName} senden ✈️`;
                for(let i=0; i<3; i++) document.getElementById(`p-dot-${i}`).className = 'progress-dot' + (i === this.currentStep ? ' active' : (i < this.currentStep ? ' done' : ''));
                
                const q = this.dailyQuestions[this.currentStep];
                document.getElementById('question-text').innerText = q.q;
                
                const list = document.getElementById('options-list');
                const tot = document.getElementById('tot-zone');
                const txt = document.getElementById('text-input');
                list.innerHTML = ""; tot.innerHTML = "";
                list.classList.add('hidden'); tot.classList.add('hidden'); txt.classList.add('hidden');

                if (q.type === 'tot') {
                    tot.classList.remove('hidden');
                    q.o.forEach(opt => {
                        const div = document.createElement('div'); div.className = 'tot-item'; div.innerText = opt;
                        div.onclick = () => { document.querySelectorAll('.tot-item').forEach(i => i.classList.remove('selected')); div.classList.add('selected'); };
                        tot.appendChild(div);
                    });
                } else if (q.type === 'ranking') {
                    list.classList.remove('hidden');
                    q.o.forEach(opt => { const div = document.createElement('div'); div.className = 'option-item'; div.innerText = opt; list.appendChild(div); });
                    Sortable.create(list, { animation: 200, forceFallback: true });
                } else if (q.type === 'text') {
                    txt.classList.remove('hidden'); txt.value = "";
                }
            },

            nextStep() {
                let ans = "";
                const q = this.dailyQuestions[this.currentStep];
                if (q.type === 'tot') ans = document.querySelector('.tot-item.selected')?.innerText;
                else if (q.type === 'ranking') ans = Array.from(document.querySelectorAll('.option-item')).map(i => i.innerText).join(" > ");
                else if (q.type === 'text') ans = document.getElementById('text-input').value.trim();
                
                if (!ans) return alert("Antwort fehlt! ✨");
                this.myAnswers.push(ans);
                this.currentStep++;
                if (this.currentStep < 3) this.renderStep();
                else this.submitAll();
            },

            async submitAll() {
                const btn = document.getElementById('next-btn');
                btn.disabled = true; btn.innerText = "Sende...";
                const { error } = await sbClient.from('answers').insert([{ user_name: this.myName.toLowerCase(), choice: this.myAnswers.join(" | "), day_key: this.todayKey }]);
                if (!error) { 
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); 
                    this.meAnswered = true;
                    this.showResults(); 
                } else {
                    alert("Fehler!"); btn.disabled = false;
                }
            },

            async showResults() {
                const { data } = await sbClient.from('answers').select('*').eq('day_key', this.todayKey);
                const me = data?.find(a => a.user_name === this.myName.toLowerCase());
                const other = data?.find(a => a.user_name === this.partnerName.toLowerCase());
                
                document.getElementById('lobby-screen').classList.add('hidden');
                document.getElementById('quiz-view').classList.add('hidden');
                document.getElementById('complete-view').classList.remove('hidden');
                
                const myS = me.choice.split(" | "), otherS = other ? other.choice.split(" | ") : null;
                let h = "";
                this.dailyQuestions.forEach((q, i) => {
                    h += `<div class="result-block"><div class="question-header">${q.q}</div><div class="comparison-grid">
                        <div class="res-bubble bubble-me"><span class="bubble-label">Ich</span>${myS[i]}</div>
                        <div class="res-bubble bubble-partner ${otherS ? 'ready' : ''}"><span class="bubble-label">${this.partnerName}</span>${otherS ? otherS[i] : '⌛ Wartet...'}</div>
                    </div></div>`;
                });
                document.getElementById('results-display').innerHTML = h;
            },

            async resetToday() {
                if(confirm("Antworten neu schreiben?")) {
                    await sbClient.from('answers').delete().eq('day_key', this.todayKey).eq('user_name', this.myName.toLowerCase());
                    location.reload();
                }
            },

            async login() {
                const e = document.getElementById('email').value.trim(), p = document.getElementById('password').value;
                const b = document.getElementById('login-btn'); b.innerText = "Prüfe..."; b.disabled = true;
                const { error } = await sbClient.auth.signInWithPassword({ email: e, password: p });
                if (error) { alert(error.message); b.innerText = "Einloggen"; b.disabled = false; }
                else location.reload();
            },

            async logout() { await sbClient.auth.signOut(); location.reload(); }
        };
        app.init();
    </script>
</body>
</html>
