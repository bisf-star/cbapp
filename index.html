<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CB-App ❤️</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff7675; --secondary: #a29bfe; --bg: #0f0c29; 
            --card: #ffffff; --text: #2d3436; --muted: #636e72; 
            --accent-green: #00b894; --light-bg: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; touch-action: manipulation; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(255, 118, 117, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 118, 117, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 118, 117, 0); }
        }

        body { 
            font-family: 'Outfit', sans-serif; background: #0f0c29; 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            display: flex; justify-content: center; overflow: hidden;
        }
        
        .container { 
            width: 100%; max-width: 450px; height: 100vh; background: var(--card); 
            display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) 0 0 0;
            position: relative;
        }

        .header { 
            height: 65px; padding: 0 25px; display: flex; 
            justify-content: space-between; align-items: center; flex-shrink: 0;
            border-bottom: 2px solid #f1f2f6;
        }
        .brand { font-size: 1.4rem; font-weight: 600; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logout-btn { background: #f1f2f6; border: none; border-radius: 12px; padding: 8px 16px; font-size: 0.8rem; color: var(--muted); cursor: pointer; font-weight: 600; transition: 0.3s; }

        .content-area { 
            flex-grow: 1; overflow-y: auto; padding: 25px 25px; 
            -webkit-overflow-scrolling: touch; display: flex; flex-direction: column;
            animation: fadeIn 0.5s ease-out;
        }

        .footer-bar { 
            padding: 15px 25px calc(65px + env(safe-area-inset-bottom)) 25px; 
            flex-shrink: 0; background: white; border-top: 1px solid #f1f2f6;
            z-index: 10;
        }
        
        .btn-action { 
            width: 100%; padding: 20px; border-radius: 22px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; font-weight: 600; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 118, 117, 0.35);
            position: relative; overflow: hidden; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .info-hint {
            background: #f1f2ff; color: var(--secondary);
            padding: 12px 18px; border-radius: 18px; font-size: 0.85rem;
            margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
            font-weight: 500; border: 1px solid rgba(162, 155, 254, 0.3);
            animation: fadeIn 0.6s ease-out;
        }

        .status-box { background: var(--light-bg); border-radius: 28px; padding: 25px; border: 1px solid #edf2f7; }
        .status-pill { display: inline-flex; align-items: center; gap: 10px; padding: 10px 18px; border-radius: 50px; font-weight: 600; font-size: 0.85rem; }
        .pill-green { background: #e3faf3; color: var(--accent-green); }
        .pill-red { background: #fff1f1; color: var(--primary); animation: ripple 2s infinite; }

        .prog-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .dot { width: 40px; height: 7px; border-radius: 10px; background: #eee; transition: 0.5s; }
        .dot.active { background: var(--secondary); width: 70px; }
        .dot.done { background: var(--accent-green); }

        /* RANKING CARDS - OPTIMIERT */
        .rank-card { 
            background: #fff; border: 2px solid #edf2f7; padding: 18px; margin-bottom: 12px; 
            border-radius: 22px; display: flex; align-items: center; gap: 15px; 
            cursor: grab; touch-action: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            user-select: none; -webkit-user-select: none;
        }
        .rank-tag { background: var(--secondary); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 600; flex-shrink: 0; }
        
        /* SortableJS Feedback Klassen */
        .sortable-chosen { 
            border-color: var(--secondary) !important;
            background: #fdfdfd;
        }
        .sortable-drag { 
            opacity: 1 !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15) !important;
            transform: scale(1.04);
            cursor: grabbing;
            background: white !important;
        }
        .sortable-ghost { 
            opacity: 0.2; 
            background: var(--secondary) !important;
            border: 2px dashed var(--secondary);
        }

        .tot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tot-box { background: var(--light-bg); border: 2px solid #edf2f7; border-radius: 28px; padding: 35px 10px; text-align: center; font-weight: 600; min-height: 110px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .tot-box.selected { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-5px); }

        textarea { width: 100%; height: 160px; border-radius: 28px; border: 2px solid #eee; padding: 20px; font-family: inherit; font-size: 1.1rem; outline: none; background: var(--light-bg); resize: none; }

        .res-bubble { padding: 15px; border-radius: 22px; font-size: 0.9rem; border: 1px solid #eee; min-height: 80px; display: flex; flex-direction: column; margin-bottom: 10px;}
        .res-bubble b { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }

        .hidden { display: none !important; }
        .login-field { width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 20px; border: 2px solid #eee; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="brand">CB-App</div>
        <button id="logout-btn" class="logout-btn hidden" onclick="app.logout()">Abmelden</button>
    </div>

    <div id="main-content" class="content-area"></div>

    <div id="footer-ui" class="footer-bar hidden">
        <button id="action-btn" class="btn-action"></button>
    </div>
</div>

<script>
    const SB_URL = "https://eedbdbqvwpquoxzbunwo.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZGJkYnF2d3BxdW94emJ1bndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzY0NDEsImV4cCI6MjA5MjI1MjQ0MX0.7RKZjDKvieO-hoCpORQeA9uFcGhLqHNTGwvYiK5ogrs";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const pool = {
        tot: [{q: "Morgenstund?", o: ["Ausschlafen 😴", "Früh sporteln 🏃"], h: "Entscheide dich für eins: Tippe auf deine Wahl! 👆"}],
        ranking: [{q: "Schönste Date-Idee?", o: ["Picknick 🧺", "Kino 🎬", "Kochen 🍳", "Wandern 🥾"], h: "Ranking: Halte & schiebe Platz 1 nach oben! 📋"}],
        text: [{q: "Drei Worte für unseren Tag?", o: [], h: "Schreib eine Nachricht für deinen Schatz! ✍️"}]
    };

    const greetings = ["Schön, dass du da bist, ", "Toll, dass es dich gibt, ", "Hi, ", "Ein Moment für euch, ", "Genieße den Tag, "];

    const app = {
        user: "", partner: "", day: new Date().toISOString().split('T')[0],
        step: 0, results: [], dailyQs: [],

        async init() {
            const seed = parseInt(this.day.replace(/-/g, ''));
            this.dailyQs = [pool.tot[seed % pool.tot.length], pool.ranking[seed % pool.ranking.length], pool.text[seed % pool.text.length]];
            const { data: { session } } = await sb.auth.getSession();
            if (!session) this.renderLogin();
            else {
                const email = session.user.email.toLowerCase();
                this.user = email === 'bisf@gmx.de' ? "Bene" : "Clara";
                this.partner = this.user === "Bene" ? "Clara" : "Bene";
                document.getElementById('logout-btn').classList.remove('hidden');
                this.showLobby();
            }
        },

        triggerFade() {
            const el = document.getElementById('main-content');
            el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'fadeIn 0.5s ease-out';
        },

        async showLobby() {
            this.triggerFade();
            const { data } = await sb.from('answers').select('*').eq('day_key', this.day);
            const me = data?.find(a => a.user_name.toLowerCase() === this.user.toLowerCase());
            const other = data?.find(a => a.user_name.toLowerCase() === this.partner.toLowerCase());

            document.getElementById('main-content').innerHTML = `
                <h2 style="font-size: 1.8rem; margin-bottom: 8px;">${greetings[Math.floor(Math.random()*greetings.length)]}${this.user}! ❤️</h2>
                <p style="color:var(--muted); margin-bottom: 30px;">Bereit für eure täglichen Gedanken?</p>
                <div class="status-box">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <span>Meine Antwort:</span> <span class="status-pill ${me?'pill-green':'pill-red'}">${me?'Fertig ✅':'Noch offen'}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span>${this.partner}:</span> <span class="status-pill ${other?'pill-green':'pill-red'}">${other?'Fertig ✅':'Hat noch nicht geantwortet'}</span>
                    </div>
                </div>
            `;
            document.getElementById('footer-ui').classList.remove('hidden');
            const btn = document.getElementById('action-btn');
            btn.innerText = me ? "Zu unseren Gedanken ✨" : "Jetzt starten 🚀";
            btn.onclick = () => me ? this.showComparison() : this.startQuiz();
        },

        startQuiz() { this.step = 0; this.results = []; this.renderQuiz(); },

        renderQuiz() {
            this.triggerFade();
            const q = this.dailyQs[this.step];
            document.getElementById('main-content').innerHTML = `
                <div class="prog-dots">${[0,1,2].map(i => `<div class="dot ${i===this.step?'active':(i<this.step?'done':'')}"></div>`).join('')}</div>
                <div class="info-hint"><span>💡</span> <span>${q.h}</span></div>
                <h2 style="font-size: 1.4rem; margin-bottom: 20px;">${q.q}</h2>
                <div id="quiz-input"></div>
            `;

            const wrap = document.getElementById('quiz-input');
            if (q.o.length === 2) {
                wrap.className = "tot-grid";
                q.o.forEach(o => {
                    const d = document.createElement('div'); d.className = "tot-box"; d.innerText = o;
                    d.onclick = () => { document.querySelectorAll('.tot-box').forEach(b => b.classList.remove('selected')); d.classList.add('selected'); };
                    wrap.appendChild(d);
                });
            } else if (q.o.length > 2) {
                q.o.forEach((o, i) => {
                    const d = document.createElement('div'); d.className = "rank-card";
                    d.innerHTML = `<span class="rank-tag">${i+1}</span><span>${o}</span>`; wrap.appendChild(d);
                });
                
                // Optimierte SortableJS Konfiguration
                setTimeout(() => { 
                    new Sortable(wrap, { 
                        animation: 250, 
                        ghostClass: 'sortable-ghost',
                        chosenClass: 'sortable-chosen',
                        dragClass: 'sortable-drag',
                        forceFallback: true,      // Erzwingt Plugin-basiertes Drag & Drop für bessere Touch-Kontrolle
                        fallbackOnBody: true,     // Heftet das gezogene Element an den Body (verhindert Versatz)
                        swapThreshold: 0.65,      // Tauscht Plätze früher für flüssigeres Gefühl
                        fallbackTolerance: 3,     // Verhindert Scroll-Konflikte
                        onStart: () => { if(window.navigator.vibrate) window.navigator.vibrate(5); },
                        onEnd: () => { 
                            document.querySelectorAll('.rank-tag').forEach((tag, idx) => tag.innerText = idx + 1); 
                        } 
                    }); 
                }, 50);
            } else {
                wrap.innerHTML = `<textarea id="txt-val" placeholder="Deine Gedanken..."></textarea>`;
            }
            document.getElementById('action-btn').innerText = this.step < 2 ? "Weiter ✨" : "Teilen ❤️";
            document.getElementById('action-btn').onclick = () => this.handleNext();
        },

        handleNext() {
            const q = this.dailyQs[this.step];
            let val = q.o.length === 2 ? document.querySelector('.tot-box.selected')?.innerText : (q.o.length > 2 ? Array.from(document.querySelectorAll('.rank-card span:last-child')).map(s => s.innerText).join(" > ") : document.getElementById('txt-val').value.trim());
            if (!val) return alert("Antwort fehlt! ❤️");
            this.results.push(val);
            if (this.step < 2) { this.step++; this.renderQuiz(); } else this.submit();
        },

        async submit() {
            const { error } = await sb.from('answers').insert([{ user_name: this.user.toLowerCase(), choice: this.results.join(" | "), day_key: this.day }]);
            if (error) alert("Fehler!"); else { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); this.showComparison(); }
        },

        async showComparison() {
            this.triggerFade();
            const { data } = await sb.from('answers').select('*').eq('day_key', this.day);
            const me = data?.find(a => a.user_name.toLowerCase() === this.user.toLowerCase());
            const other = data?.find(a => a.user_name.toLowerCase() === this.partner.toLowerCase());
            const myA = me.choice.split(" | "), otherA = other ? other.choice.split(" | ") : null;

            document.getElementById('main-content').innerHTML = `
                <h2 style="font-size: 1.8rem; margin-bottom: 25px;">Unsere Antworten</h2>
                ${this.dailyQs.map((q, i) => `
                    <div style="margin-bottom:25px;">
                        <div style="font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; margin-bottom:10px;">${q.q}</div>
                        <div class="tot-grid">
                            <div class="res-bubble" style="background:#f1f0ff;"><b>ICH</b>${myA[i]}</div>
                            <div class="res-bubble" style="background:${otherA?'#e3faf3':'#fff1f1'};"><b>${this.partner.toUpperCase()}</b>${otherA ? otherA[i] : '⌛ Hat noch nicht geantwortet'}</div>
                        </div>
                    </div>`).join('')}
            `;
            const btn = document.getElementById('action-btn');
            btn.innerText = "Antworten korrigieren 📝";
            btn.onclick = () => this.deleteMyOwn();
        },

        async deleteMyOwn() {
            if (confirm("Antworten löschen?")) {
                await sb.from('answers').delete().eq('day_key', this.day).eq('user_name', this.user.toLowerCase());
                this.showLobby();
            }
        },

        renderLogin() {
            this.triggerFade();
            document.getElementById('main-content').innerHTML = `<h2 style="margin-top:20px; font-size: 2.2rem;">CB-App</h2><p style="color:var(--muted); margin-bottom: 35px;">Unser Moment für heute ❤️</p><label style="font-size:0.8rem; font-weight:600; color:var(--muted); margin-left:10px;">LOGIN</label><input id="em" type="email" class="login-field" placeholder="E-Mail"><input id="pw" type="password" class="login-field" placeholder="Passwort">`;
            document.getElementById('footer-ui').classList.remove('hidden');
            const btn = document.getElementById('action-btn');
            btn.innerText = "Einloggen ✨";
            btn.onclick = async () => {
                const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('em').value, password: document.getElementById('pw').value });
                if (error) alert("Falsch!"); else this.init();
            };
        },

        async logout() {
            await sb.auth.signOut();
            localStorage.clear(); sessionStorage.clear();
            setTimeout(() => this.renderLogin(), 200);
        }
    };
    app.init();
</script>
</body>
</html>
