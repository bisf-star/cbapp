1<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CB-App ♥</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #d63031; /* Modernes Rot */
            --secondary: #6c5ce7; /* Modernes Lila */
            --accent: #a29bfe;
            --bg: #1a1a2e; /* Dunkler, moderner Hintergrund */
            --card: #ffffff;
            --text: #2d3436; 
        }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 30%, #2d3436 0%, #1a1a2e 100%);
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            color: var(--text); 
        }

        .container { 
            width: 95%; 
            max-width: 420px; 
            background: var(--card); 
            margin: 20px; 
            border-radius: 25px; 
            padding: 40px 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            text-align: center; 
            align-self: center; 
        }

        .status-bar { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-bottom: 25px; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #636e72;
        }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; background: #dfe4ea; border: 2px solid #fff; }
        .active-dot { background: #00b894; box-shadow: 0 0 10px rgba(0, 184, 148, 0.5); }

        h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 5px; font-weight: 600; letter-spacing: -1px; }
        .logo-app { color: var(--secondary); }
        h2 { font-size: 1.3rem; line-height: 1.4; color: #2d3436; margin-top: 0; }

        input { 
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; 
            border: 2px solid #f1f2f6; box-sizing: border-box; font-size: 1rem; outline: none;
        }
        input:focus { border-color: var(--secondary); }

        .option-item { 
            background: #f8f9fa; border: 2px solid #f1f2f6; padding: 16px; 
            margin: 12px 0; border-radius: 15px; cursor: pointer; transition: 0.2s;
        }
        .option-item.selected { 
            background: #f1f2ff; border-color: var(--secondary); color: var(--secondary); font-weight: 600; 
        }
        
        .ranking-list .option-item { cursor: grab; display: flex; align-items: center; gap: 12px; text-align: left; }
        .ranking-list .option-item::before { content: '☰'; color: #b2bec3; }

        textarea { 
            width: 100%; height: 100px; border-radius: 15px; border: 2px solid #f1f2f6; 
            padding: 15px; box-sizing: border-box; font-family: inherit; font-size: 1rem; outline: none;
        }

        button { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); 
            color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; 
            font-weight: 600; font-size: 1.1rem; cursor: pointer; margin-top: 20px;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.2);
        }
        button:active { transform: scale(0.98); }

        .hidden { display: none; }
        .result-box { text-align: left; background: #f9f9ff; padding: 20px; border-radius: 15px; border-left: 5px solid var(--secondary); margin-top: 25px; }
        .heart { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <h1>CB<span class="logo-app">-App</span> <span class="heart">♥</span></h1>
        <p style="color: #636e72; margin-bottom: 25px;">Euer täglicher Check-in.</p>
        <input type="text" id="email" placeholder="E-Mail">
        <input type="password" id="password" placeholder="Passwort">
        <button onclick="app.login()">Einloggen</button>
    </div>

    <div id="main-screen" class="hidden">
        <div class="status-bar">
            <span><span id="dot-other" class="status-dot"></span> Partner</span>
        </div>
        <h2 id="question-text"></h2>
        <div id="interaction-area">
            <div id="options-list" class="ranking-list"></div>
            <textarea id="text-answer" class="hidden" placeholder="Schreib hier etwas..."></textarea>
        </div>
        <button id="submit-btn" onclick="app.submit()">Antwort speichern</button>
        <div id="result-view" class="hidden">
            <div class="result-box" id="result-content"></div>
            <button onclick="app.logout()" style="background: #eee; color: #666; font-size: 0.8rem; padding: 10px; margin-top: 30px;">Abmelden</button>
        </div>
    </div>
</div>

<script>
const SB_URL = "https://eedbdbqvwpquoxzbunwo.supabase.co";
const SB_KEY = "Sb_publishable_k7vTHNDeNYoBMlfxx9HISg_vFfdfzpm";
const supabase = libsupabase.createClient(SB_URL, SB_KEY);

const app = {
    session: null,
    todayKey: new Date().toISOString().split('T')[0],
    currentQ: null,
    
    questions: [
        { type: "choice", q: "Was ist unsere größte Stärke als Team?", opts: ["Gleicher Humor", "Vertrauen", "Kommunikation", "Spontaneität"] },
        { type: "ranking", q: "Was macht einen regnerischen Tag perfekt?", opts: ["Film-Marathon", "Zusammen kochen", "Lange schlafen", "Brettspiele"] },
        { type: "text", q: "Was ist eine kleine Sache, die ich heute für dich tun könnte?", opts: [] },
        { type: "choice", q: "Welches Abenteuer sollten wir als nächstes wagen?", opts: ["Tandem-Bungee", "Wochenende ohne Handy", "Kochkurs", "Einfach ans Meer"] },
        { type: "ranking", q: "In welcher Stadt würden wir am glücklichsten leben?", opts: ["New York", "Paris", "Tokio", "Kopenhagen", "Wien"] }
    ],

    async init() {
        const { data } = await supabase.auth.getSession();
        if (data.session) { this.session = data.session; this.showMain(); }
    },

    async login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert("Login fehlgeschlagen: " + error.message);
        else { this.session = data.session; this.showMain(); }
    },

    async logout() { await supabase.auth.signOut(); location.reload(); },

    showMain() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        this.loadDaily();
    },

    loadDaily() {
        const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
        this.currentQ = this.questions[dayOfYear % this.questions.length];
        document.getElementById('question-text').innerText = this.currentQ.q;
        const list = document.getElementById('options-list');
        const txt = document.getElementById('text-answer');
        list.innerHTML = ""; txt.classList.add('hidden');

        if (this.currentQ.type === 'text') {
            txt.classList.remove('hidden');
        } else if (this.currentQ.type === 'choice') {
            this.currentQ.opts.forEach(o => {
                const d = document.createElement('div');
                d.className = "option-item"; d.innerText = o;
                d.onclick = () => { document.querySelectorAll('.option-item').forEach(i => i.classList.remove('selected')); d.classList.add('selected'); };
                list.appendChild(d);
            });
        } else if (this.currentQ.type === 'ranking') {
            this.currentQ.opts.forEach(o => {
                const d = document.createElement('div'); d.className = "option-item"; d.innerText = o; list.appendChild(d);
            });
            Sortable.create(list, { animation: 150 });
        }
        this.checkStatus();
    },

    async submit() {
        let val = "";
        if (this.currentQ.type === 'text') val = document.getElementById('text-answer').value;
        else if (this.currentQ.type === 'choice') val = document.querySelector('.option-item.selected')?.innerText;
        else if (this.currentQ.type === 'ranking') val = Array.from(document.querySelectorAll('.option-item')).map(i => i.innerText).join(" → ");

        if (!val) return alert("Antwort fehlt!");
        const { error } = await supabase.from('answers').insert([{ user_name: this.session.user.email, question_id: 0, choice: val, day_key: this.todayKey }]);

        if (error) alert("Heute bereits erledigt!");
        else {
            const h = confetti.shapeFromText({ text: '❤️' });
            confetti({ shapes: [h], particleCount: 50, spread: 70, origin: { y: 0.6 }, colors: ['#d63031', '#6c5ce7'] });
            this.checkStatus();
        }
    },

    async checkStatus() {
        const { data } = await supabase.from('answers').select('*').eq('day_key', this.todayKey);
        if (data) {
            const me = data.find(a => a.user_name === this.session.user.email);
            const other = data.find(a => a.user_name !== this.session.user.email);
            if (other) document.getElementById('dot-other').classList.add('active-dot');
            if (me) {
                document.getElementById('submit-btn').classList.add('hidden');
                document.getElementById('interaction-area').classList.add('hidden');
                document.getElementById('result-view').classList.remove('hidden');
                document.getElementById('result-content').innerHTML = `<b>Deine Antwort:</b><br>${me.choice}<br><br>` + 
                    (other ? `<b>Vom Partner:</b><br>${other.choice}` : "<i>Warte auf Partner...</i>");
            }
        }
    }
};
app.init();
</script>
</body>
</html>
