<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CB-App ❤️</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --main-pink: #ff7eb3;
            --soft-pink: #ffeef2;
            --bg-gradient: linear-gradient(180deg, #ffdee9 0%, #ffffff 100%);
            --text-dark: #4a4a4a;
            --white: #ffffff;
            --accent-green: #00b894;
            --muted: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-gradient); 
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center;
        }
        
        .container { 
            width: 100%; max-width: 450px;
            padding: env(safe-area-inset-top) 20px 100px 20px;
        }

        /* Profile & Status Header */
        .profile-section {
            display: flex; justify-content: center; align-items: center;
            margin: 30px 0; position: relative;
        }
        .avatar {
            width: 75px; height: 75px; border-radius: 50%;
            border: 3px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: #eee; overflow: hidden; z-index: 1;
        }
        .avatar.partner { margin-left: -15px; border-color: var(--soft-pink); z-index: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* Timer Banner */
        .timer-banner {
            background: white; border-radius: 20px; padding: 15px 20px;
            margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255, 126, 179, 0.2);
        }
        .countdown-display { font-family: monospace; font-size: 1.3rem; font-weight: 700; color: var(--text-dark); }

        /* Status Box (Lobby) */
        .status-card {
            background: var(--white); border-radius: 25px; padding: 25px;
            margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.03);
        }
        .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .status-row:last-child { margin-bottom: 0; }
        .status-pill { padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 0.8rem; }
        .pill-done { background: #e3faf3; color: var(--accent-green); }
        .pill-wait { background: #fff1f1; color: var(--main-pink); }

        /* Question Cards */
        .card {
            background: var(--white); border-radius: 25px; padding: 25px;
            margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-label { font-size: 0.75rem; font-weight: 700; color: var(--main-pink); text-transform: uppercase; margin-bottom: 12px; display: block; }
        .card-title { font-size: 1.2rem; font-weight: 700; line-height: 1.4; margin-bottom: 20px; }

        /* Input Elements */
        .tot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .tot-box { background: #f8fafc; border: 2px solid #f1f2f6; border-radius: 20px; padding: 25px 10px; text-align: center; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .tot-box.selected { background: var(--main-pink); color: white; border-color: var(--main-pink); }

        .rank-card { background: #fff; border: 2px solid #f1f2f6; padding: 15px; margin-bottom: 10px; border-radius: 18px; display: flex; align-items: center; gap: 15px; cursor: grab; font-weight: 600; }
        .rank-tag { background: var(--main-pink); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }

        .input-area { width: 100%; border-radius: 20px; border: 2px solid #f1f2f6; padding: 15px; font-family: inherit; font-size: 1rem; margin-bottom: 15px; resize: none; min-height: 120px; background: #f8fafc; }

        .btn-action { background: var(--main-pink); color: white; width: 100%; padding: 18px; border-radius: 22px; border: none; font-weight: 700; font-size: 1.1rem; cursor: pointer; box-shadow: 0 6px 15px rgba(255, 126, 179, 0.35); }

        .res-bubble { padding: 12px; border-radius: 18px; font-size: 0.9rem; border: 1px solid #f1f2f6; margin-bottom: 8px; }
        .res-bubble b { font-size: 0.65rem; color: var(--muted); display: block; margin-bottom: 4px; }

        .hidden { display: none !important; }

        /* Bottom Tab Bar */
        .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; height: 75px; background: white; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
        .tab-item { font-size: 1.4rem; opacity: 0.3; }
        .tab-item.active { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div id="ui-header">
        <div class="profile-section">
            <div class="avatar"><img id="my-avatar" src=""></div>
            <div class="avatar partner"><img id="partner-avatar" src=""></div>
        </div>

        <div class="timer-banner">
            <div>
                <div style="font-size: 0.7rem; font-weight: 700; color: var(--main-pink);">NÄCHSTE RUNDE IN</div>
                <div id="main-timer" class="countdown-display">00:00:00</div>
            </div>
            <div style="font-size: 1.5rem;">🌸</div>
        </div>
    </div>

    <div id="main-content"></div>
</div>

<div class="tab-bar">
    <div class="tab-item active">🏠</div>
    <div class="tab-item">💬</div>
    <div class="tab-item">❤️</div>
    <div class="tab-item">👤</div>
</div>

<script>
    const SB_URL = "https://eedbdbqvwpquoxzbunwo.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZGJkYnF2d3BxdW94emJ1bndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzY0NDEsImV4cCI6MjA5MjI1MjQ0MX0.7RKZjDKvieO-hoCpORQeA9uFcGhLqHNTGwvYiK5ogrs";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const pool = {
        tot: [
            {id: "t1", q: "Morgenstund?", o: ["Ausschlafen 😴", "Früh sporteln 🏃"]},
            {id: "t2", q: "Netflix oder Club?", o: ["Couch 🍿", "Tanzen 🕺"]},
            {id: "t3", q: "Pizza oder Pasta?", o: ["Pizza 🍕", "Pasta 🍝"]},
            {id: "t4", q: "Berge oder Meer?", o: ["Gipfel 🏔️", "Strand 🌊"]},
            {id: "t5", q: "Kaffee oder Tee?", o: ["Kaffee ☕", "Tee 🍵"]},
            {id: "t7", q: "Hund oder Katze?", o: ["Wuff 🐶", "Miau 🐱"]},
            {id: "t8", q: "Sommer oder Winter?", o: ["Hitze ☀️", "Schnee ❄️"]},
            {id: "t12", q: "Süß oder Salzig?", o: ["Schokolade 🍫", "Chips 🥨"]},
            {id: "t18", q: "Frühaufsteher oder Nachteule?", o: ["Lerchen 🌅", "Eulen 🌙"]},
            {id: "t19", q: "Badewanne oder Dusche?", o: ["Entspannen 🛁", "Erfrischen 🚿"]}
        ],
        ranking: [
            {id: "r1", q: "Schönste Date-Idee?", o: ["Picknick 🧺", "Kino 🎬", "Kochen 🍳", "Wandern 🥾"]},
            {id: "r3", q: "Bester Pizza-Belag?", o: ["Margherita 🧀", "Salami 🍕", "Gemüse 🥦", "Scharf 🌶️"]},
            {id: "r4", q: "Lieblings-Genre?", o: ["Comedy 😂", "Thriller 😱", "Romanze ❤️", "Sci-Fi 👽"]},
            {id: "r8", q: "Wichtige Charaktereigenschaft?", o: ["Humor 😂", "Treue 🤝", "Abenteuerlust 🧗", "Empathie ✨"]},
            {id: "r10", q: "Lieblings-Frühstück?", o: ["Pancakes 🥞", "Rührei 🥚", "Müsli 🥣", "Brötchen 🥨"]}
        ],
        text: [
            {id: "x1", q: "Drei Worte für unseren Tag?", o: []},
            {id: "x2", q: "Was war heute dein Highlight?", o: []},
            {id: "x3", q: "Was schätzt du heute an mir?", o: []},
            {id: "x5", q: "Ein Song, der mich an dich erinnert?", o: []},
            {id: "x8", q: "Wenn wir jetzt wegfliegen könnten - wohin?", o: []}
        ]
    };

    const app = {
        user: "", partner: "", day: new Date().toISOString().split('T')[0],
        dailyQs: [], currentStep: 0, results: [],

        async init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) return this.renderLogin();
            
            const email = session.user.email.toLowerCase();
            this.user = email === 'bisf@gmx.de' ? "Bene" : "Clara";
            this.partner = this.user === "Bene" ? "Clara" : "Bene";
            
            document.getElementById('my-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${this.user}`;
            document.getElementById('partner-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${this.partner}`;
            
            this.loadDailyQs();
            this.showLobby();
            this.startTimer();
        },

        loadDailyQs() {
            const seed = parseInt(this.day.replace(/-/g, ''));
            const getSeeded = (arr, s) => arr[s % arr.length];
            this.dailyQs = [getSeeded(pool.tot, seed), getSeeded(pool.ranking, seed), getSeeded(pool.text, seed)];
        },

        async showLobby() {
            const { data } = await sb.from('answers').select('*').eq('day_key', this.day);
            const me = data?.find(a => a.user_name.toLowerCase() === this.user.toLowerCase());
            const other = data?.find(a => a.user_name.toLowerCase() === this.partner.toLowerCase());

            let content = `
                <h2 style="font-weight:700; margin-bottom:10px;">Hi ${this.user}! ❤️</h2>
                <div class="status-card">
                    <div class="status-row">
                        <span>Meine Antwort:</span>
                        <span class="status-pill ${me?'pill-done':'pill-wait'}">${me?'Fertig ✅':'Offen'}</span>
                    </div>
                    <div class="status-row">
                        <span>${this.partner}:</span>
                        <span class="status-pill ${other?'pill-done':'pill-wait'}">${other?'Fertig ✅':'Wartet...'}</span>
                    </div>
                </div>
                <button class="btn-action" onclick="${me ? 'app.showComparison()' : 'app.startQuiz()'}">
                    ${me ? 'Zu den Antworten ✨' : 'Jetzt starten 🚀'}
                </button>
            `;
            document.getElementById('main-content').innerHTML = content;
        },

        startQuiz() { this.currentStep = 0; this.results = []; this.renderStep(); },

        renderStep() {
            const q = this.dailyQs[this.currentStep];
            let inputHtml = '';

            if (q.o.length === 2) {
                inputHtml = `<div class="tot-grid">${q.o.map(o => `<div class="tot-box" onclick="app.handleTot('${o}')">${o}</div>`).join('')}</div>`;
            } else if (q.o.length > 2) {
                inputHtml = `<div id="sort-wrap">${q.o.map((o, i) => `<div class="rank-card"><span class="rank-tag">${i+1}</span><span>${o}</span></div>`).join('')}</div><button class="btn-action" style="margin-top:20px" onclick="app.handleRank()">Speichern</button>`;
            } else {
                inputHtml = `<textarea id="txt-in" class="input-area" placeholder="Deine Antwort..."></textarea><button class="btn-action" onclick="app.handleText()">Weiter</button>`;
            }

            document.getElementById('main-content').innerHTML = `
                <div class="card">
                    <span class="card-label">Frage ${this.currentStep + 1} / 3</span>
                    <div class="card-title">${q.q}</div>
                    ${inputHtml}
                </div>
            `;

            if (q.o.length > 2) {
                new Sortable(document.getElementById('sort-wrap'), { 
                    animation: 200, onEnd: () => { document.querySelectorAll('.rank-tag').forEach((t, i) => t.innerText = i + 1); }
                });
            }
        },

        handleTot(val) { this.results.push(val); this.nextStep(); },
        handleText() { const v = document.getElementById('txt-in').value.trim(); if(!v) return; this.results.push(v); this.nextStep(); },
        handleRank() { const v = Array.from(document.querySelectorAll('#sort-wrap span:last-child')).map(s => s.innerText).join(" > "); this.results.push(v); this.nextStep(); },

        nextStep() {
            if (this.currentStep < 2) { this.currentStep++; this.renderStep(); } 
            else this.submit();
        },

        async submit() {
            const finalChoice = this.results.join(" | ") + " [" + this.dailyQs.map(q => q.q).join(",") + "]";
            await sb.from('answers').insert([{ user_name: this.user.toLowerCase(), choice: finalChoice, day_key: this.day }]);
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            location.reload();
        },

        async showComparison() {
            const { data } = await sb.from('answers').select('*').eq('day_key', this.day);
            const me = data.find(a => a.user_name.toLowerCase() === this.user.toLowerCase());
            const other = data.find(a => a.user_name.toLowerCase() === this.partner.toLowerCase());
            const myA = me.choice.split(" [")[0].split(" | ");
            const otherA = other ? other.choice.split(" [")[0].split(" | ") : null;

            document.getElementById('main-content').innerHTML = `
                <button class="btn-action" style="margin-bottom:20px; background:#eee; color:#4a4a4a; box-shadow:none;" onclick="app.showLobby()">← Zurück</button>
                ${this.dailyQs.map((q, i) => `
                    <div class="card">
                        <span class="card-label">${q.q}</span>
                        <div class="res-bubble" style="background:var(--soft-pink)"><b>ICH</b>${myA[i]}</div>
                        <div class="res-bubble" style="background:${otherA?'#e0f9f0':'#fff1f1'}"><b>${this.partner.toUpperCase()}</b>${otherA ? otherA[i] : 'Noch offen...'}</div>
                    </div>
                `).join('')}
            `;
        },

        startTimer() {
            setInterval(() => {
                const diff = new Date().setHours(24,0,0,0) - new Date();
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('main-timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        },

        renderLogin() {
            document.getElementById('ui-header').classList.add('hidden');
            document.getElementById('main-content').innerHTML = `
                <div class="card" style="margin-top:50px">
                    <h2 style="text-align:center; font-weight:700;">CB-App ❤️</h2>
                    <input id="em" type="email" class="input-area" style="height:auto" placeholder="E-Mail">
                    <input id="pw" type="password" class="input-area" style="height:auto" placeholder="Passwort">
                    <button class="btn-action" onclick="app.login()">Einloggen</button>
                </div>`;
        },

        async login() {
            const { error } = await sb.auth.signInWithPassword({ email: document.getElementById('em').value, password: document.getElementById('pw').value });
            if (error) alert("Fehler!"); else location.reload();
        }
    };

    app.init();
</script>
</body>
</html>
