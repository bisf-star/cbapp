    <style>
        :root { 
            --primary: #ff7675; --secondary: #a29bfe; --bg: #0f0c29; 
            --card: rgba(255, 255, 255, 0.98); --text: #2d3436; 
            --muted: #636e72; --accent-green: #00b894; --accent-red: #fab1a0; --light-bg: #f8fafc;
        }
        body { font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top right, #2d3436, #0f0c29); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text); padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 420px; background: var(--card); border-radius: 40px; padding: 40px 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); text-align: center; margin: auto; backdrop-filter: blur(10px); animation: fadeIn 0.6s ease-out; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .brand-title { font-size: 3.5rem; font-weight: 600; letter-spacing: -3px; margin: 0; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .progress-container { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .progress-dot { width: 40px; height: 6px; border-radius: 10px; background: #dfe4ea; transition: 0.4s; }
        .progress-dot.active { background: var(--secondary); width: 60px; }
        .progress-dot.done { background: var(--accent-green); }

        .status-badge { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 25px; font-size: 0.85rem; font-weight: 600; color: var(--muted); background: #f1f2f6; padding: 10px 20px; border-radius: 50px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #dfe4ea; }
        .dot-active { background: var(--accent-green); box-shadow: 0 0 12px var(--accent-green); }
        .dot-waiting { background: var(--accent-red); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        h2 { font-size: 1.4rem; color: var(--text); margin-bottom: 20px; font-weight: 600; line-height: 1.3; min-height: 4rem; display: flex; align-items: center; justify-content: center; }

        .option-item { background: var(--light-bg); border: 2px solid #edf2f7; padding: 16px; margin: 8px 0; border-radius: 20px; cursor: pointer; transition: 0.2s; text-align: left; display: flex; align-items: center; gap: 12px; font-size: 0.95rem; }
        .option-item.selected { background: #f1f0ff; border-color: var(--secondary); color: #574b90; font-weight: 600; }
        .this-or-that-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .tot-item { background: var(--light-bg); border: 2px solid #edf2f7; border-radius: 22px; padding: 25px 10px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .tot-item.selected { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.03); }

        textarea { width: 100%; height: 120px; border-radius: 20px; border: 2px solid #edf2f7; padding: 15px; box-sizing: border-box; font-family: inherit; font-size: 1rem; outline: none; resize: none; background: var(--light-bg); }

        .info-box { background: #f1f2ff; border-radius: 22px; padding: 15px; margin-top: 20px; text-align: left; font-size: 0.75rem; color: #574b90; border: 1px solid #dcdde1; }
        .info-box b { color: var(--secondary); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }

        button#next-btn { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; border: none; padding: 22px; width: 100%; border-radius: 22px; font-weight: 600; font-size: 1.1rem; cursor: pointer; margin-top: 15px; box-shadow: 0 8px 15px rgba(255, 118, 117, 0.2); transition: 0.3s; }
        button#next-btn:active { transform: scale(0.98); }

        .result-card { text-align: left; background: #fdfdfd; padding: 20px; border-radius: 22px; border: 1px solid #edf2f7; margin-top: 20px; font-size: 0.9rem; }
        .result-card b { display: block; margin-bottom: 4px; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; font-size: 0.7rem; }
        .hidden { display: none; }
    </style>
</head>
