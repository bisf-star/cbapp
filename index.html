<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CB-App</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #ff7675; --secondary: #a29bfe; --bg: #0f0c29; 
            --card: rgba(255, 255, 255, 0.98); --text: #2d3436; 
            --muted: #636e72; --accent-green: #00b894; --accent-red: #fab1a0; --light-bg: #f8fafc;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        body { 
            font-family: 'Outfit', sans-serif; background: radial-gradient(circle at top right, #2d3436, #0f0c29); 
            margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; color: var(--text); overflow: hidden;
        }
        .container { 
            width: 100%; max-width: 450px; height: 100vh; background: var(--card); 
            display: flex; flex-direction: column; padding: 15px 20px env(safe-area-inset-bottom); position: relative;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; height: 40px; margin-bottom: 5px; }
        .logout-btn { background: #eee; border: none; border-radius: 10px; cursor: pointer; color: var(--muted); padding: 5px 10px; font-size: 0.7rem; font-weight: 600; }
        .brand-title { font-size: 1.6rem; font-weight: 600; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        
        .progress-container { display: flex; justify-content: center; gap: 5px; margin: 10px 0; }
        .progress-dot { width: 15px; height: 4px; border-radius: 5px; background: #dfe4ea; transition: 0.3s; }
        .progress-dot.active { background: var(--secondary); width: 35px; }
        .progress-dot.done { background: var(--accent-green); }

        .mode-info { background: #f1f2ff; border-radius: 12px; padding: 10px; margin-bottom: 10px; border-left: 4px solid var(--secondary); font-size: 0.75rem; color: #574b90; text-align: left; }
        h2 { font-size: 1.1rem; margin: 5px 0 15px 0; font-weight: 600; line-height: 1.3; text-align: center; }

        #input-zone { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; overflow-y: auto; padding-bottom: 10px; }
        .option-item { background: var(--light-bg); border: 2px solid #edf2f7; padding: 12px; margin: 5px 0; border-radius: 15px; text-align: left; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; touch-action: none; }
        .num-tag { background: var(--secondary); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; flex-shrink: 0; }
        .tot-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .tot-item { background: var(--light-bg); border: 2px solid #edf2f7; border-radius: 15px; padding: 20px 10px; cursor: pointer; font-weight: 600; font-size: 0.9rem; min-height: 70px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .tot-item.selected { background: var(--primary); color: white; border-color: var(--primary); }
        textarea { width: 100%; height: 100px; border-radius: 15px; border: 2px solid #edf2f7; padding: 12px; font-family: inherit; font-size: 1rem; outline: none; resize: none; background: var(--light-bg); }

        .btn-action { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; border: none; padding: 18px; width: 100%; border-radius: 18px; font-weight: 600; font-size: 1.1rem; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; text-align: left; }
        .res-box { padding: 10px; border-radius: 12px; font-size: 0.75rem; border: 1px solid #eee; }
        .res-me { background: #f1f0ff; border-color: var(--secondary); }
        .res-partner { background: #fff1f1; }
        .res-partner.ready { background: #e3faf3; border-color: var(--accent-green); }
        .hidden { display: none !important; }
        .login-field { width: 100%; padding: 15px; margin: 8px 0; border-radius: 15px; border: 2px solid #eee; box-sizing: border-box; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1 id="brand-ui" class="brand-title">CB-App</h1>
            <button id="logout-icon" class="logout-btn hidden" onclick="app.logout()">Logout</button>
        </div>

        <div id="content" style="flex-grow:1; display:flex; flex-direction:column;">
            <div id="login-screen" class="hidden">
                <p style="color: var(--muted); margin-bottom: 20px;">Anmelden</p>
                <input type="email" id="email" class="login-field" placeholder="E-Mail">
                <input type="password" id="password" class="login-field" placeholder="Passwort">
                <button onclick="app.login()" class="btn-action">Einloggen</button>
            </div>

            <div id="lobby-screen" class="hidden">
                <h2 id="greet-ui" style="text-align:left; font-size: 1.4rem;">Hi!</h2>
                <div style="background: #f8fafc; border-radius: 15px; padding: 15px; margin-bottom: 20px; font-size: 0.9rem;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>Ich:</span><span id="my-st">Laden...</span></div>
                    <div style="display:flex; justify-content:space-between;"><span>Partner:</span><span id="p-st">Laden...</span></div>
                </div>
                <button onclick="app.startQuiz()" class="btn-action" id="start-btn">Start</button>
            </div>

            <div id="quiz-screen" class="hidden" style="flex-grow:1; display:flex; flex-direction:column;">
                <div class="progress-container"><div id="p0" class="progress-dot"></div><div id="p1" class="progress-dot"></div><div id="p2" class="progress-dot"></div></div>
                <div class="mode-info"><b id="m-title">INFO</b><span id="m-desc">Wähle weise.</span></div>
                <h2 id="q-text">...</h2>
                <div id="input-zone">
                    <div id="options-list"></div>
                    <div id="tot-zone" class="tot-container hidden"></div>
                    <textarea id="text-input" class="hidden" placeholder="Schreib hier..."></textarea>
                </div>
                <button id="next-btn" class="btn-action" onclick="app.nextStep()">Weiter ✨</button>
            </div>

            <div id="result-screen" class="hidden" style="overflow-y: auto;">
                <h2 style="text-align:left;">Eure Antworten</h2>
                <div id="results-display"></div>
                <button style="background:none; border:none; color:#bbb; padding:15px; width:100%; font-size:0.7rem;" onclick="app.resetToday()">Korrigieren 📝</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://eedbdbqvwpquoxzbunwo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlZGJkYnF2d3BxdW94emJ1bndvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzY0NDEsImV4cCI6MjA5MjI1MjQ0MX0.7RKZjDKvieO-hoCpORQeA9uFcGhLqHNTGwvYiK5ogrs";
        const sbClient = supabase.createClient(SB_URL, SB_KEY);

        const pool = {
            tot: [{q: "Frühaufsteher?", o: ["Ja ☀️", "Nein 😴"], i: "This or That: Wähle eine Seite!"}, {q: "Pizza?", o: ["Salami 🍕", "Margherita 🧀"], i: "Entscheide dich!"}],
            ranking: [{q: "Wochenend-Plan?", o: ["Chillen", "Action", "Freunde", "Sport"], i: "Ranking: Sortiere nach Prio!"}],
            text: [{q: "Was liebst du an heute?", o: [], i: "Gedanken: Schreib einen Satz."}]
        };

        const app = {
            session: null, today: new Date().toISOString().split('T')[0],
            myName: "", pName: "", step: 0, dailyQs: [], answers: [],

            async init() {
                const { data: { session } } = await sbClient.auth.getSession();
                if (session) { 
                    this.session = session; 
                    const email = session.user.email.toLowerCase();
                    this.myName = email === 'bisf@gmx.de' ? "Bene" : "Clara";
                    this.pName = this.myName === "Bene" ? "Clara" : "Bene";
                    document.getElementById('logout-icon').classList.remove('hidden');
                    this.loadLobby();
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            },

            async loadLobby() {
                document.getElementById('greet-ui').innerText = `Hallo ${this.myName}! ❤️`;
                const { data } = await sbClient.from('answers').select('*').eq('day_key', this.today);
                const meAns = data?.find(a => a.user_name === this.myName.toLowerCase());
                const otherAns = data?.find(a => a.user_name === this.pName.toLowerCase());
                
                document.getElementById('my-st').innerText = meAns ? "Fertig ✅" : "Offen ⏳";
                document.getElementById('p-st').innerText = otherAns ? "Fertig ✅" : "Überlegt... ⏳";
                document.getElementById('start-btn').innerText = meAns ? "Ergebnisse ansehen ✨" : "Jetzt loslegen 🚀";
                
                document.getElementById('lobby-screen').classList.remove('hidden');
                document.getElementById('login-screen').classList.add('hidden');
            },

            startQuiz() {
                const seed = parseInt(this.today.replace(/-/g, ''));
                this.dailyQs = [pool.tot[seed % pool.tot.length], pool.ranking[seed % pool.ranking.length], pool.text[seed % pool.text.length]];
                this.syncCheck();
            },

            async syncCheck() {
                const { data } = await sbClient.from('answers').select('*').eq('day_key', this.today).eq('user_name', this.myName.toLowerCase());
                if (data && data.length > 0) this.showResults();
                else {
                    document.getElementById('lobby-screen').classList.add('hidden');
                    document.getElementById('quiz-screen').classList.remove('hidden');
                    this.render();
                }
            },

            render() {
                const q = this.dailyQs[this.step];
                document.getElementById('q-text').innerText = q.q;
                document.getElementById('m-title').innerText = q.o.length === 2 ? "THIS OR THAT" : (q.o.length === 0 ? "GEDANKEN" : "RANKING");
                document.getElementById('m-desc').innerText = q.i;
                document.getElementById('next-btn').innerText = this.step < 2 ? "Weiter ✨" : `An ${this.pName} senden ✈️`;
                
                for(let i=0; i<3; i++) document.getElementById(`p${i}`).className = 'progress-dot' + (i === this.step ? ' active' : (i < this.step ? ' done' : ''));

                const list = document.getElementById('options-list');
                const tot = document.getElementById('tot-zone');
                const txt = document.getElementById('text-input');
                list.innerHTML = ""; tot.innerHTML = "";
                list.classList.add('hidden'); tot.classList.add('hidden'); txt.classList.add('hidden');

                if (q.o.length === 2) {
                    tot.classList.remove('hidden');
                    q.o.forEach(o => {
                        const d = document.createElement('div'); d.className = 'tot-item'; d.innerText = o;
                        d.onclick = () => { document.querySelectorAll('.tot-item').forEach(x => x.classList.remove('selected')); d.classList.add('selected'); };
                        tot.appendChild(d);
                    });
                } else if (q.o.length > 2) {
                    list.classList.remove('hidden');
                    q.o.forEach((o, i) => {
                        const d = document.createElement('div'); d.className = 'option-item';
                        d.innerHTML = `<span class="num-tag">${i+1}</span><span>${o}</span>`;
                        list.appendChild(d);
                    });
                    Sortable.create(list, { animation: 150, onEnd: () => { document.querySelectorAll('.num-tag').forEach((n, i) => n.innerText = i + 1); }});
                } else {
                    txt.classList.remove('hidden'); txt.value = "";
                }
            },

            async nextStep() {
                const q = this.dailyQs[this.step];
                let a = "";
                if (q.o.length === 2) a = document.querySelector('.tot-item.selected')?.innerText;
                else if (q.o.length > 2) a = Array.from(document.querySelectorAll('.option-item span:last-child')).map(s => s.innerText).join(" > ");
                else a = document.getElementById('text-input').value.trim();

                if (!a) return alert("Halt! Deine Antwort fehlt.");
                this.answers.push(a);
                if (this.step < 2) { this.step++; this.render(); }
                else { this.submit(); }
            },

            async submit() {
                const btn = document.getElementById('next-btn');
                btn.disabled = true; btn.innerText = "Wird gesendet...";
                const { error } = await sbClient.from('answers').insert([{ user_name: this.myName.toLowerCase(), choice: this.answers.join(" | "), day_key: this.today }]);
                if (!error) { confetti(); this.showResults(); } else { alert("Fehler!"); btn.disabled = false; }
            },

            async showResults() {
                const { data } = await sbClient.from('answers').select('*').eq('day_key', this.today);
                const me = data?.find(a => a.user_name === this.myName.toLowerCase());
                const other = data?.find(a => a.user_name === this.pName.toLowerCase());
                document.getElementById('lobby-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                
                const seed = parseInt(this.today.replace(/-/g, ''));
                const qs = [pool.tot[seed % pool.tot.length], pool.ranking[seed % pool.ranking.length], pool.text[seed % pool.text.length]];
                const myA = me.choice.split(" | "), otherA = other ? other.choice.split(" | ") : null;
                
                let h = "";
                qs.forEach((q, i) => {
                    h += `<div style="margin-top:15px; font-weight:600; font-size:0.8rem; color:#888;">${q.q}</div>
                    <div class="result-grid">
                        <div class="res-box res-me"><b>ICH</b>${myA[i]}</div>
                        <div class="res-box res-partner ${otherA ? 'ready' : ''}"><b>${this.pName}</b>${otherA ? otherA[i] : '⌛ Wartet...'}</div>
                    </div>`;
                });
                document.getElementById('results-display').innerHTML = h;
            },

            async resetToday() {
                if(!confirm("Antworten löschen?")) return;
                await sbClient.from('answers').delete().eq('day_key', this.today).eq('user_name', this.myName.toLowerCase());
                location.reload();
            },

            async login() {
                const email = document.getElementById('email').value.trim();
                const pass = document.getElementById('password').value;
                const { error } = await sbClient.auth.signInWithPassword({ email, password: pass });
                if (error) alert(error.message); else location.reload();
            },
            logout() { sbClient.auth.signOut().then(() => location.reload()); }
        };
        app.init();
    </script>
</body>
</html>
